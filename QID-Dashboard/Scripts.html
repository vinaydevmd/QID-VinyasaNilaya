<script>
  window.onload = loadDashboard;

  // Global scope memory variables to act as the single source of truth locally
  window.dashboardCache = null;

  /**
   * High-performance data bridge entry point.
   * Checks for a cached state before triggering a slow server-side fetch.
   */
  function loadDashboard(forcedRefresh = false) {
      const yearEl = document.getElementById('filterYear');
      // Reads whatever is currently selected in your live dropdown, falling back to current calendar year
      const selectedYear = yearEl && yearEl.value ? yearEl.value : new Date().getFullYear().toString();

      // Context check: If data is already cached locally and this is a standard filter switch, use it!
      if (window.dashboardCache && !forcedRefresh) {
          console.log(">>> [PERFORMANCE] Serving view from local memory allocation cache.");
          processAndFilterData(window.dashboardCache);
          return;
      }

      // Otherwise, toggle loading animation state and make the server call
      toggleRefreshLoadingState(true);
      console.log(">>> [NETWORK] Pulling fresh data stream from server ledger...");

      google.script.run
          .withSuccessHandler(function(response) {
              toggleRefreshLoadingState(false);
              
              // Commit payload directly into memory
              window.dashboardCache = response;

              if (response && response.guests) {
                  rebuildMonthDropdown(response.guests);
              }
              
              // Route payload into the visual layout processors
              processAndFilterData(response);
          })
          .withFailureHandler(function(err) {
              toggleRefreshLoadingState(false);
              console.error(">>> [CRITICAL] Ledger network grab failed: ", err.message);
              document.getElementById('guest-feed').innerHTML = 
                  `<div class="alert alert-danger mx-3">Failed to load real-time database data: ${err.message}</div>`;
          })
          .getDashboardData(selectedYear);
  }

  /**
   * User action script bound directly to the new refresh icon button
   */
  function refreshDashboardData() {
      console.log(">>> [ACTION] Refresh button clicked. Evicting data cache...");

      // Triggers button icon swap and injects the center primary loader placeholder
      toggleRefreshLoadingState(true);

      loadDashboard(true); // Sends 'true' to force a fresh pull from the server
  }

  /**
   * Handle filtering instantaneously in client-side memory
   */
  function handleMonthChange() {
      if (window.dashboardCache) {
          processAndFilterData(window.dashboardCache);
      } else {
          loadDashboard();
      }
  }

/**
 * Consolidated Change Handler triggered by any dropdown state updates
 */
function handleFilterChange() {
    if (window.dashboardCache) {
        processAndFilterData(window.dashboardCache);
    }
}

  /**
   * Process calculations and filter the dataset locally without striking the server again
   */
  function processAndFilterData(rawData) {
      if (!rawData) return;
      
      // 1. Deep clone the object to keep structural mutations cleanly isolated
      let dataCopy = JSON.parse(JSON.stringify(rawData));
      
      // 2. Safely read ALL live UI filter states from the dashboard
      const monthFilterEl = document.getElementById('filterMonth');
      const targetMonth = monthFilterEl ? monthFilterEl.value : "All";
      
      const yearFilterEl = document.getElementById('filterYear');
      const currentYear = yearFilterEl ? yearFilterEl.value : new Date().getFullYear().toString();

      const sourceFilterEl = document.getElementById('filterSource');
      const targetSource = sourceFilterEl ? sourceFilterEl.value : "All";

      const floorFilterEl = document.getElementById('filterFloor');
      const targetFloor = floorFilterEl ? floorFilterEl.value : "All";

      console.log(`>>> [UI] Multi-Filter Execution: [Month: ${targetMonth}] | [Source: ${targetSource}] | [Floor: ${targetFloor}]`);

      // 3. Extract your baseline working guest list array layout
      let workingArray = Array.isArray(dataCopy.guests) ? dataCopy.guests : Object.values(dataCopy.guests);
      
      // 4. THE UNIFIED FILTER MATRIX: Evaluates all dimensions simultaneously
      let filteredArray = workingArray.filter(g => {
          // --- Dimension A: Month Matching ---
          let matchMonth = true;
          if (targetMonth !== "All" && targetMonth !== "") {
              if (!g.Month) return false;
              const recordMonth = String(g.Month).trim().toLowerCase();
              const selectedMonth = targetMonth.toLowerCase();
              matchMonth = recordMonth.startsWith(selectedMonth) || selectedMonth.startsWith(recordMonth);
          }

          // --- Dimension B: Booking Source Matching (Airbnb vs Personal) ---
          const guestSource = g.Source ? g.Source.toString().trim().toLowerCase() : "";
          const matchSource = (targetSource === "All" || guestSource === targetSource.toLowerCase());

          // --- Dimension C: Property Floor Assignment Matching ---
          const guestFloor = g.Floor ? g.Floor.toString().trim().toLowerCase() : "";
          const selectedFloor = targetFloor.toLowerCase();

          let matchFloor = false;
          if (targetFloor === "All" || targetFloor === "") {
              matchFloor = true;
          } else {
              // Allows partial matching so "Ground Floor" matches "Ground" and vice versa
              matchFloor = guestFloor.includes(selectedFloor) || selectedFloor.includes(guestFloor);
          }

          // Include row only if it clears all active viewport boundary rules
          return matchMonth && matchSource && matchFloor;
      });
      
      // 5. COMPUTE KPI METRICS: Always calculate totals on the final filtered subset
      let runningRevenue = 0;
      filteredArray.forEach(g => {
          let amtStr = g.Amount ? String(g.Amount).replace(/[₹,]/g, '') : "0";
          let amt = parseFloat(amtStr) || 0;
          runningRevenue += amt;
      });

      // 6. Assemble dynamic UI presentation labels based on current states
      let periodLabel = "";
      if (targetMonth === "All" || targetMonth === "") {
          periodLabel = `All Months ${currentYear}`;
      } else {
          periodLabel = `${targetMonth} ${currentYear}`;
      }

      // Append filter terms to label if they aren't set to "All" for clear tracking context
      if (targetSource !== "All") periodLabel += ` (${targetSource})`;
      if (targetFloor !== "All") periodLabel += ` (${targetFloor})`;

      // 7. Commit new data states back to the temporary payload copy
      dataCopy.guests = filteredArray;
      dataCopy.summary.totalRevenue = runningRevenue.toLocaleString('en-IN');
      dataCopy.summary.count = filteredArray.length;
      dataCopy.summary.period = `${periodLabel} Collection Summary`;

      // 8. Ship straight into your polished, reversed render engine layout view
      renderDashboard(dataCopy);
  }


  /**
   * UI loading toggle helper function to animate icons smoothly
   */
   function toggleRefreshLoadingState(isLoading) {
    const icon = document.getElementById('refresh-icon');
    const spinner = document.getElementById('refresh-spinner');
    const btn = document.getElementById('refresh-dashboard-btn');
    const feedContainer = document.getElementById('guest-feed'); // Target the main layout card area
    
    if (!icon || !spinner || !btn) return;

    if (isLoading) {
        // 1. Convert the header button state to spinning
        icon.classList.add('d-none');
        spinner.classList.remove('d-none');
        btn.disabled = true;

        // 2. ENFORCED: Inject your exact primary center spinner back into the feed
        if (feedContainer) {
            feedContainer.innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary opacity-25" role="status"></div>
                </div>
            `;
        }
    } else {
        // 3. Revert header button back to normal arrow icon
        icon.classList.remove('d-none');
        spinner.classList.add('d-none');
        btn.disabled = false;
        
        // Note: feedContainer.innerHTML is handled and replaced natively by renderDashboard(data)
    }
}

  // Ensure tooltips map correctly to the fresh elements on lifecycle load sequence
  document.addEventListener("DOMContentLoaded", function() {
      if (typeof initTooltips === 'function') initTooltips();
      loadDashboard(); // Core boot sequence initialization logic trigger
  });

/**
 * Initializes the dashboard lifecycle. Resolves available year tabs,
 * updates the filter options, and sets the dashboard to the current year.
 */
function initializeDashboardLifecycle() {
    console.log(">>> [BOOT] Querying live database tab names...");
    
    google.script.run
        .withSuccessHandler(function(config) {
            const yearDropdown = document.getElementById('filterYear');
            if (!yearDropdown) return;
            
            // Clear out any old elements safely
            yearDropdown.innerHTML = '';
            
            // Populate options dynamically from real Google Sheets structures
            config.years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.innerText = year;
                
                // Set active matching selection on initial render state
                if (year === config.activeYear) {
                    option.selected = true;
                }
                yearDropdown.appendChild(option);
            });
            
            console.log(`>>> [BOOT] Year filters armed: [${config.years.join(', ')}]. Active year defaults to: [${config.activeYear}].`);
            
            // Kickstart standard dashboard data fetch using the dynamically evaluated selected year state
            loadDashboard();
        })
        .withFailureHandler(function(err) {
            console.error(">>> [BOOT CRASH] System failed to inventory layout years: ", err.message);
            // Hard fallback if connectivity issues happen on configuration query
            const yearDropdown = document.getElementById('filterYear');
            if (yearDropdown) {
                yearDropdown.innerHTML = `<option value="${new Date().getFullYear()}">${new Date().getFullYear()}</option>`;
            }
            loadDashboard();
        })
        .getAvailableYearsAndInitialize();
}

// Redirect your page initialization anchor to target the new boot method
document.addEventListener("DOMContentLoaded", function() {
    if (typeof initTooltips === 'function') initTooltips();
    
    // Instead of calling loadDashboard() directly, hit the year configurations analyzer first!
    initializeDashboardLifecycle(); 
});

/**
 * Dynamically rebuilds the Month Dropdown based exclusively on months 
 * that actually exist in the loaded dataset for the selected year.
 */
/**
 * Dynamically rebuilds the Month Dropdown chronologically (January -> December)
 * based exclusively on data rows present in the active sheet year.
 */
function rebuildMonthDropdown(guests) {
    const monthDropdown = document.getElementById('filterMonth');
    if (!monthDropdown) return;

    // 1. Save the user's active filter viewport selection before wiping elements
    const previousSelection = monthDropdown.value || "";

    // 2. Reset dropdown container with the constant baseline master switch
    monthDropdown.innerHTML = '<option value="">All Months</option>';

    if (!guests) return;

    // Normalize incoming data format structure down to a real collection loop wrapper
    const guestList = Array.isArray(guests) ? guests : Object.values(guests);

    // 3. Extract completely unique month names present in your ledger data
    const uniqueMonths = [];
    guestList.forEach(g => {
        if (g.Month && g.Month.trim() !== "") {
            // Capitalize first letter to guarantee matching consistency (e.g. "may" -> "May")
            const m = g.Month.trim().charAt(0).toUpperCase() + g.Month.trim().slice(1).toLowerCase();
            if (!uniqueMonths.includes(m)) {
                uniqueMonths.push(m);
            }
        }
    });

    // 4. FIXED CHRONOLOGICAL ORDER DICTIONARY: Maps full names to calendar metrics
    const calendarSequence = { 
        "January": 1, "February": 2, "March": 3, "April": 4, "May": 5, "June": 6, 
        "July": 7, "August": 8, "September": 9, "October": 10, "November": 11, "December": 12 
    };
    
    // Sort array entries mathematically from 1 up to 12
    uniqueMonths.sort((a, b) => (calendarSequence[a] || 99) - (calendarSequence[b] || 99));

    // 5. Generate and append the option tags dynamically into your view component
    uniqueMonths.forEach(monthName => {
        const option = document.createElement('option');
        option.value = monthName;      // Sets structural matching value to full word (e.g., "January")
        option.innerText = monthName;  // Sets readable interface presentation label
        
        // Retain the user's active focus if it matches an option in the new dataset
        if (monthName === previousSelection) {
            option.selected = true;
        }
        
        monthDropdown.appendChild(option);
    });

    // If their active filter doesn't exist in this specific historical year, reset the look cleanly to "All"
    if (previousSelection && !uniqueMonths.includes(previousSelection)) {
        monthDropdown.value = "";
    }
}

// STANDALONE ENCODED MESSAGE LINK HELPER (Prevents Template Nesting Syntax Errors)
// =========================================================================
function getEncodedWAMessageLink(type, phone, guestName) {
    const guestFirstName = guestName ? guestName.split(' ')[0] : 'Guest';
    let msg = '';
    
    if (type === 'verification') {
        msg = 'Hello ' + guestFirstName + ',\n\nThank you for choosing Vinyasa Nilaya! 🏡\n\nTo ensure a seamless arrival, please check your registration profile and submit your digital ID verification using our secure dashboard portal link here:\n👉 https://vinyasanilaya.s.gy/GuestVerification\n\nWe look forward to welcoming you soon! Let us know if you need any assistance before check-in.';
    } else if (type === 'welcome') {
        msg = 'Hello ' + guestFirstName + ',\n\nWelcome to Vinyasa Nilaya! ✨\n\nYour check-in is ready. We hope you have an incredible, relaxing stay with us. If you have any questions regarding the house guides, amenities, or local check-ins, feel free to drop us a message anytime right here.\n\nEnjoy your time!';
    } else if (type === 'feedback') {
        msg = 'Hello ' + guestFirstName + ',\n\nThank you for staying at Vinyasa Nilaya! 🌿\n\nWe hope you had a wonderful trip and felt completely at home. Your feedback means the world to us. Could you take a brief minute to share your review and experience? Your feedback helps us continue crafting amazing stays for the community.\n\nSafe travels, and we look forward to hosting you again!';
    }
    
    return 'https://api.whatsapp.com/send?phone=' + phone + '&text=' + encodeURIComponent(msg);
}

// 1st Version for EDIT\ADD Model
function renderDashboard(data) {
    // 1. Log the entire raw response from the server
    console.log(">>> [DEBUG] Server Data Received:", data);

    // --- TURN OFF ALL SPINNERS AUTOMATICALLY ---
    toggleRefreshLoadingState(false);

    // 2. Initial Null Check with specific log
    if (!data) {
        console.error(">>> [ERROR] Data is null or undefined.");
        document.getElementById('guest-feed').innerHTML = 
            '<div class="alert alert-danger mx-3">Error: No response from server.</div>';
        return;
    }

    if (!data.summary) {
        console.error(">>> [ERROR] 'summary' property missing from data object. Data keys found:", Object.keys(data));
        document.getElementById('guest-feed').innerHTML = 
            '<div class="alert alert-danger mx-3">Error: Summary data missing.</div>';
        return;
    }

    // 3. Log Summary details
    console.log(">>> [DEBUG] Summary Details:", {
        revenue: data.summary.totalRevenue,
        count: data.summary.count,
        period: data.summary.period
    });

    // Update Summary UI
    document.getElementById('stat-revenue').innerText = data.summary.totalRevenue;
    document.getElementById('stat-count').innerText = data.summary.count;
    document.getElementById('period-label').innerText = data.summary.period;

    // --- COMPONENT UPDATE: Inject the new All-Time Revenue target element value ---
    const lifetimeRevEl = document.getElementById('stat-lifetime-revenue');
    const lifetimeCountEl = document.getElementById('stat-lifetime-count');

    if (lifetimeRevEl && data.summary.lifetimeRevenue) {
        lifetimeRevEl.innerText = '₹' + data.summary.lifetimeRevenue;
    }
    
    if (lifetimeCountEl && data.summary.lifetimeCount !== undefined) {
        lifetimeCountEl.innerText = data.summary.lifetimeCount.toLocaleString('en-IN');
    }

    const feed = document.getElementById('guest-feed');
    feed.innerHTML = '';

    // 4. Log Guest List status
    if (!data.guests || data.guests.length === 0) {
        console.warn(">>> [DEBUG] Guest list is empty.");
        feed.innerHTML = '<div class="text-center mt-5 text-muted">No entries found for this period.</div>';
        return;
    }
    
    console.log(`>>> [DEBUG] Processing ${data.guests.length} guests.`);

    // --- FORCE CONVERT TYPE TO GUARANTEE A CLEAN REVERSAL ---
    let normalizedGuests = [];
    
    if (Array.isArray(data.guests)) {
        normalizedGuests = data.guests.slice();
    } else if (typeof data.guests === 'object') {
        normalizedGuests = Object.keys(data.guests)
                                 .sort((a, b) => Number(a) - Number(b))
                                 .map(key => data.guests[key]);
    }

    if (normalizedGuests.length === 0) {
        console.warn(">>> [DEBUG] Normalized array tracking registers 0 entries.");
        feed.innerHTML = '<div class="text-center mt-5 text-muted">No entries found for this period.</div>';
        return;
    }

    const invertedGuestFeed = normalizedGuests.reverse();

    invertedGuestFeed.forEach((guest, index) => {
        const source = guest.Source || "Personal";
        const sourceClass = source === 'AirBnb' || source === 'Airbnb' ? 'tag-airbnb' : 'tag-personal';
        const isVerified = guest.isVerified || false; 

        // =========================================================================
        // DYNAMIC CONTEXT-AWARE BADGE ENGINE
        // =========================================================================
        let badgeHtml = '';
        const cleanSource = (guest.Source || '').toLowerCase().trim();

        if (cleanSource === 'airbnb') {
            badgeHtml = '<span class="badge bg-primary-subtle text-primary border-0 rounded-pill" style="font-size: 10px; background-color: #FF5A5F15; color: #FF5A5F !important;"><i class="bi bi-shield-check me-1"></i>Airbnb Verified</span>';
        } else if (isVerified) {
            badgeHtml = '<span class="badge bg-success-subtle text-success border-0 rounded-pill" style="font-size: 10px;"><i class="bi bi-shield-check me-1"></i>QID Verified</span>';
        } else {
            badgeHtml = '<span class="badge bg-light text-muted border-0 rounded-pill" style="font-size: 10px;"><i class="bi bi-shield-exclamation me-1"></i>Pending ID</span>';
        }

     

        // =========================================================================
        // ADVANCED WHATSAPP ACTION ENGINE GENERATOR
        // =========================================================================
        let whatsappActionsHtml = '';
        
        if (guest.WhatsApp_Num && guest.WhatsApp_Num.toString().trim().length >= 10) {
            let rawNum = guest.WhatsApp_Num.toString().trim();
            if (rawNum.startsWith("+91")) rawNum = rawNum.replace("+91", "").trim();
            if (rawNum.startsWith("91") && rawNum.length > 10) rawNum = rawNum.substring(2).trim();

            const targetPhone = `91${rawNum}`;

            const linkVerification = getEncodedWAMessageLink('verification', targetPhone, guest.Name);
            const linkWelcome      = getEncodedWAMessageLink('welcome', targetPhone, guest.Name);
            const linkFeedback     = getEncodedWAMessageLink('feedback', targetPhone, guest.Name);

            whatsappActionsHtml = `
                <div class="dropdown d-inline-block ms-2">
                    <button class="btn btn-sm d-inline-flex align-items-center justify-content-center dropdown-toggle shadow-sm" 
                            type="button" 
                            id="waMenu_${index}" 
                            data-bs-toggle="dropdown" 
                            aria-expanded="false"
                            style="background-color: #25D366; color: white; border: none; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; height: 22px;">
                        <i class="bi bi-whatsapp me-1" style="font-size: 11px;"></i> Chat
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 p-1" aria-labelledby="waMenu_${index}" style="border-radius: 10px; min-width: 210px; font-size: 12px; z-index: 1050;">
                        <li>
                            <a class="dropdown-item py-2 d-flex align-items-center" href="${linkVerification}" target="_blank" style="border-radius: 6px;">
                                <i class="bi bi-shield-check text-success me-2 fs-6"></i> 1. Verification Link
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item py-2 d-flex align-items-center" href="${linkWelcome}" target="_blank" style="border-radius: 6px;">
                                <i class="bi bi-emoji-smile text-primary me-2 fs-6"></i> 2. Welcome Guest
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item py-2 d-flex align-items-center" href="${linkFeedback}" target="_blank" style="border-radius: 6px;">
                                <i class="bi bi-heart text-danger me-2 fs-6"></i> 3. Checkout & Feedback
                            </a>
                        </li>
                    </ul>
                </div>
            `;
        }

        const safeGuestJson = JSON.stringify(guest).replace(/"/g, '&quot;');
        const safeNameEscaped = (guest.Name || '').replace(/'/g, "\\'");
        const guestYear = guest.Check_in_Date ? guest.Check_in_Date.split(',')[1]?.trim() : new Date().getFullYear().toString();

        const card = `
          <div class="card guest-card shadow-sm p-3 mb-3 border-0 position-relative" style="border-radius: 14px;">
            
            <div class="position-absolute d-flex gap-2 align-items-center" style="top: 12px; right: 12px; z-index: 10;">
              <button class="btn btn-link p-1 text-muted shadow-none border-0" 
                      onclick="openEditModal(${safeGuestJson})"
                      data-bs-toggle="tooltip"
                      title="Edit Guest Data"
                      style="text-decoration: none;">
                <i class="bi bi-pencil-square text-secondary fs-5"></i>
              </button>
              <button class="btn btn-link p-1 text-danger shadow-none border-0" 
                      onclick="actionPurgeGuestRecord('${safeNameEscaped}', '${guest.Check_in_Date || ''}', '${guestYear}')"
                      data-bs-toggle="tooltip"
                      title="Delete Guest Ledger Entry"
                      style="text-decoration: none;">
                <i class="bi bi-trash fs-5"></i>
              </button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2" style="padding-right: 65px;">
              <span class="source-tag ${sourceClass} fw-bold">${source}</span>
              ${badgeHtml}
            </div>

            <div class="d-flex justify-content-between align-items-center mb-2" style="padding-right: 20px;">
              <div class="d-flex align-items-center" style="max-width: 75%;">
                <h6 class="fw-bold mb-0 text-truncate" style="line-height: 1.2;">${guest.Name}</h6>
                ${whatsappActionsHtml}
              </div>
              <div class="text-warning small ms-2" style="white-space: nowrap;">${guest.Customer_Ratings || ''}</div>
            </div>

            <div class="row g-0 py-2 border-top border-bottom my-2">
              <div class="col-6 small text-muted">
                <div class="d-block" style="font-size: 10px; letter-spacing: 0.5px;">CHECK-IN</div>
                <div class="text-dark fw-medium">${guest.Check_in_Date || 'N/A'}</div>
              </div>
              <div class="col-6 small text-muted text-end border-start ps-2">
                <div class="d-block" style="font-size: 10px; letter-spacing: 0.5px;">DURATION</div>
                <div class="text-dark fw-medium">${guest.Days || 1} Night(s)</div>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-1">
              <div>
                <div class="h5 fw-bold text-primary mb-0">₹${Number(guest.Amount).toLocaleString('en-IN')}</div>
                <div class="small text-muted" style="font-size: 11px;">
                  ${guest.Guests || 0} Guests • Floor: ${guest.Floor || '-'}
                </div>
              </div>
              
              <div class="text-end small text-muted">
                <i class="bi bi-geo-alt me-1"></i>${guest.Floor || 'Ground'}
              </div>
            </div>
                                         
            ${guest.Comments ? `
              <div class="mt-2 pt-2 border-top small text-muted">
                  <em><i class="bi bi-chat-dots me-1"></i>${guest.Comments}</em>
              </div>
            ` : ''}
          </div>
        `;
        feed.innerHTML += card;
    });
    console.log(">>> [DEBUG] Render complete.");
}
/*Airbnb Sync through emails*/
function triggerAirbnbSync() {
    const icon = document.getElementById('sync-icon');
    const spinner = document.getElementById('sync-spinner');
    const btn = document.getElementById('sync-btn');

    // 1. Dynamically read the exact year the user is looking at right now
    const yearEl = document.getElementById('filterYear');
    const activeDashboardYear = yearEl ? yearEl.value : new Date().getFullYear().toString();

     console.log("activeDashboardYear :", activeDashboardYear);
    
    // Switch to loading state
    icon.classList.add('d-none');
    spinner.classList.remove('d-none');
    btn.disabled = true;

    // Call the Google Apps Script Backend
    google.script.run
        .withSuccessHandler(function(result) {
            // Restore button state
            icon.classList.remove('d-none');
            spinner.classList.add('d-none');
            btn.disabled = false;
            
            // 3. Populate and trigger the Premium Custom Modal UI
            document.getElementById('syncModalTitle').innerText = "Sync Successful";
            document.getElementById('syncModalMessage').innerText = result || "Airbnb confirmation emails read and cataloged perfectly.";
            
            const successModal = new bootstrap.Modal(document.getElementById('syncResultModal'));
            successModal.show();
            
            // Refresh dashboard data automatically if your fetch function is named loadDashboard
            loadDashboard(true); 
        })
        .withFailureHandler(function(err) {
            icon.classList.remove('d-none');
            spinner.classList.add('d-none');
            btn.disabled = false;
            //alert("Sync Failed: " + err.message);
            // Display error gracefully within the same styled modal context frame
            document.getElementById('syncModalTitle').innerText = "Sync Deferred";
            document.getElementById('syncModalMessage').innerText = "System encountered an error: " + err.message;
            
            const errorModal = new bootstrap.Modal(document.getElementById('syncResultModal'));
            errorModal.show();
        })
        .syncAirbnbEmails(activeDashboardYear); // Calls the backend function
}

    const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));

        return new bootstrap.Tooltip(tooltipTriggerEl, {
            boundary: document.body,
            trigger : 'hover' // Guarantees it disappears cleanly immediately when clicked
        });
    });

// A comprehensive, bulletproof way to initialize Bootstrap tooltips
function initTooltips() {
  try {
    // 1. Verify Bootstrap's JavaScript library is safely loaded in the memory ecosystem
    if (typeof bootstrap !== 'undefined' && bootstrap.Tooltip) {
      const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
      
      tooltipTriggerList.map(function (tooltipTriggerEl) {
        // Clean up any old instances before rebuilding to prevent detached memory leaks
        const oldInstance = bootstrap.Tooltip.getInstance(tooltipTriggerEl);
        if (oldInstance) oldInstance.dispose();
        
        return new bootstrap.Tooltip(tooltipTriggerEl, {
          boundary: document.body,
          trigger: 'hover',
          fallbackPlacements: ['top', 'left'] // Automatically adjusts if screen space is tight on mobile
        });
      });
      console.log(">>> [UI] Bootstrap Tooltips successfully bound and armed.");
    } else {
      console.warn(">>> [UI] Bootstrap JS library missing. Retrying in 500ms...");
      setTimeout(initTooltips, 500); // Retry loop structure if script load tags are lagging
    }
  } catch (err) {
    console.error("Tooltip engine init failed: ", err);
  }
}

// Trigger initialization on both standard DOM ready statuses
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initTooltips);
} else {
    initTooltips(); // Execute immediately if DOM elements are already structurally hot
}

/**
 * Advanced Pre-populating Controller parsing all layout objects into fields
 */
function openEditModal(guestObj) {
    // 1. Initial Entry Diagnostics
    console.log(">>> 🔓 [MODAL OPEN] Triggered. Raw guest data received from card:", guestObj);

    document.getElementById('guestCrudForm').reset();
    document.getElementById('formMode').value = "EDIT";
    
    // Bind unique structural references
    const calculatedRowIndex = guestObj.Row_Number || guestObj.rowNum || "";
    document.getElementById('formRowIndex').value = calculatedRowIndex;
    console.log(`>>> 📍 [MODAL OPEN] Targeted Spreadsheet Row Index: [${calculatedRowIndex}]`);
    
    // Fill Text & Digital Elements
    document.getElementById('inputName').value = guestObj.Name || "";
    document.getElementById('inputAmount').value = guestObj.Amount ? String(guestObj.Amount).replace(/[₹,]/g,'') : "";
    document.getElementById('inputGuestsCount').value = guestObj.Guests || "1";
    document.getElementById('inputDays').value = guestObj.Days || "1";
    document.getElementById('inputComments').value = guestObj.Comments || "";

    // Parse Mobile Number (Strip country code to match your data protocols)
    let rawMobile = guestObj.WhatsApp_Num || guestObj.Mobile || "";
    let cleanMobile = rawMobile.toString().replace(/^\+91/, '').trim();
    document.getElementById('inputMobile').value = cleanMobile;

    // --- BUG FIX: SAFE LOCAL ISO EXTRACTION SYSTEM ---
    if (guestObj.Check_in_Date) {
        let dateStr = String(guestObj.Check_in_Date).trim();
        let parsedDate = new Date(dateStr);
        
        if (!isNaN(parsedDate.getTime())) {
            // Extract components using local time vectors to protect against UTC shifting anomalies
            let yyyy = parsedDate.getFullYear();
            let mm = String(parsedDate.getMonth() + 1).padStart(2, '0'); // Months are 0-indexed
            let dd = String(parsedDate.getDate()).padStart(2, '0');
            
            let formattedIsoDate = `${yyyy}-${mm}-${dd}`; // Perfectly matches YYYY-MM-DD
            
            document.getElementById('inputCheckIn').value = formattedIsoDate;
            console.log(`>>> 📅 [MODAL OPEN] Date parsed cleanly: "${dateStr}" ➔ "${formattedIsoDate}"`);
        } else {
            // Secondary Fallback: If it's already an HTML-style YYYY-MM-DD string, handle it cleanly
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                document.getElementById('inputCheckIn').value = dateStr;
            } else {
                document.getElementById('inputCheckIn').value = "";
                console.warn(`>>> ⚠️ [MODAL OPEN] Date fallback could not translate structural data: "${dateStr}"`);
            }
        }
    } else {
        console.warn(">>> ⚠️ [MODAL OPEN] " + guestObj.Name + "'s profile is missing a Check_in_Date property value.");
        document.getElementById('inputCheckIn').value = ""; // Enforce safe state initialization
    }

    // --- BULLETPROOF ROBUST DROPDOWN SELECTORS MATCHING ---
    const rawSource = guestObj.Source ? guestObj.Source.toString().trim().toLowerCase() : "";
    const sourceSelectEl = document.getElementById('inputSource');
    if (rawSource.includes("airbnb")) {
        sourceSelectEl.value = "Airbnb";
    } else if (rawSource.includes("personal")) {
        sourceSelectEl.value = "Personal";
    } else {
        sourceSelectEl.value = "Airbnb"; 
    }

    const rawFloor = guestObj.Floor ? guestObj.Floor.toString().trim().toLowerCase() : "";
    const floorSelectEl = document.getElementById('inputFloor');
    if (rawFloor.includes("ground") || rawFloor === "g") {
        floorSelectEl.value = "Ground";
    } else if (rawFloor.includes("second") || rawFloor === "s") {
        floorSelectEl.value = "Second";
    } else {
        floorSelectEl.value = "Ground"; 
    }

    const rawRatings = guestObj.Customer_Ratings || "";
    document.getElementById('inputRatings').value = rawRatings;

    console.log(`>>> 🎛️ [MODAL OPEN] Dropdowns assigned configurations: Source=[${sourceSelectEl.value}], Floor=[${floorSelectEl.value}], Ratings=[${rawRatings || 'None'}]`);

    // Toggle Modal Interface Title States
    document.getElementById('guestFormModalLabel').innerText = "Modify Guest Registration";
    document.getElementById('formSubmitBtn').innerText = "Update Changes";
    getModalInstance().show();
}

/**
 * Update Submit handler to dispatch payload data variables back to server
 */
function handleFormSubmit(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('formSubmitBtn');
    
    // Direct DOM extraction check
    const checkInInput = document.getElementById('inputCheckIn');
    if (!checkInInput || !checkInInput.value) {
        alert("Please select a valid Check-In Date before submitting.");
        return false;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Processing Booking...";

    const mode = document.getElementById('formMode').value;
    const rowIdx = document.getElementById('formRowIndex').value;
    const activeYear = document.getElementById('filterYear').value || new Date().getFullYear().toString();

    // Read full parameters list array definitions cleanly
    const payload = {
        name: document.getElementById('inputName').value.trim(),
        mobile: document.getElementById('inputMobile').value.replace(/\s+/g, ''), // Strip spaces
        amount: parseFloat(document.getElementById('inputAmount').value) || 0,
        guests: parseInt(document.getElementById('inputGuestsCount').value) || 1,
        checkIn: checkInInput.value, // Confirmed valid YYYY-MM-DD string
        days: parseInt(document.getElementById('inputDays').value) || 1,
        source: document.getElementById('inputSource').value,
        floor: document.getElementById('inputFloor').value,
        ratings: document.getElementById('inputRatings').value,
        comments: document.getElementById('inputComments').value.trim(),
        year: activeYear,
        rowIndex: rowIdx
    };

    console.log(`>>> 🚀 [CRUD DISPATCH] Mode: [${mode}] | Year Target Sheet: [${activeYear}] | Row Number Reference: [${rowIdx}]`);
    console.log(">>> 📦 [CRUD DISPATCH] Outbound Form Payload Object Data:", payload);

    google.script.run
        .withSuccessHandler(function(response) {
            console.log(`>>> ✅ [CRUD TRANSACTION SUCCESS] Backend Response: "${response}"`);
            submitBtn.disabled = false;
            getModalInstance().hide();
            
            console.log(">>> 🔄 Cache evicted. Forcing dashboard content refresh cycle...");
            loadDashboard(true); 
        })
        .withFailureHandler(function(err) {
            console.error(">>> ❌ [CRUD TRANSACTION FAILURE] API connection pipeline aborted with error:", err);
            submitBtn.disabled = false;
            alert("Database Error: " + err.message);
        })
        .writeGuestDataRow(mode, payload);
}

/**
 * Instant In-Memory Search Engine Filtering
 */
function filterQidRecords() {
    const term = document.getElementById('qidSearchInput').value.toLowerCase().trim();
    const cards = document.querySelectorAll('.qid-user-card');
    
    cards.forEach(function(card) {
        const searchPool = card.getAttribute('data-search') || '';
        card.style.display = searchPool.indexOf(term) !== -1 ? "block" : "none";
    });
}

/**
 * Helper Utility to trigger highly customized professional confirmation/status alerts
 */
function showQidActionPrompt(options) {
    const modalEl = document.getElementById('qidActionModal');
    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
    
    // Inject Title & Subtext Details Safely
    document.getElementById('qidActionTitle').innerText = options.title || "Confirm Action";
    document.getElementById('qidActionMessage').innerText = options.message || "";
    
    // Set Theme Configurations (Danger/Warning/Success)
    const iconContainer = document.getElementById('qidActionIconContainer');
    const iconEl = document.getElementById('qidActionIcon');
    const confirmBtn = document.getElementById('btnQidActionConfirm');
    
    // Clear old theme definitions
    iconContainer.className = "mb-3 d-flex align-items-center justify-content-center mx-auto rounded-circle";
    confirmBtn.className = "btn btn-sm text-white px-3 w-50";
    
    if (options.type === "danger") {
        iconContainer.classList.add("bg-danger-subtle");
        iconEl.className = "bi bi-exclamation-triangle text-danger fs-3";
        confirmBtn.classList.add("bg-danger");
    } else {
        iconContainer.classList.add("bg-warning-subtle");
        iconEl.className = "bi bi-question-circle text-warning fs-3";
        confirmBtn.classList.add("bg-warning", "text-dark");
    }
    
    // Set confirmation button action text labels
    confirmBtn.innerText = options.confirmText || "Confirm";
    
    // Handle Event Execution Mapping Safely without memory leak piling
    confirmBtn.onclick = function() {
        modal.hide();
        if (typeof options.onConfirm === "function") options.onConfirm();
    };
    
    modal.show();
}

/**
 * Modernized Delete Record Execution utilizing professional Bootstrap layouts
 */
function actionRemoveQidUser(slNo, name) {
    showQidActionPrompt({
        type: "danger",
        title: "Delete Verified Profile?",
        message: "Are you certain you want to permanently delete " + name + "'s verification history? This will purge their record inside your spreadsheet ledger maps instantly.",
        confirmText: "Delete Record",
        onConfirm: function() {
            // Keep user context responsive by updating background container elements
            document.getElementById('qidUserFeed').innerHTML = `
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-danger spinner-border-sm me-2" role="status"></div>
                    <span class="text-danger small fw-medium">Purging profile from registry ledger...</span>
                </div>`;
                
            google.script.run
                .withSuccessHandler(function(response) {
                    console.log(">>> [DELETE QID SUCCESS]", response);
                    openQidHubModal(); // Soft dynamic refresh reload
                })
                .withFailureHandler(function(err) {
                    showQidActionPrompt({
                        type: "danger",
                        title: "Operation Failed",
                        message: "The deletion command dropped unexpectedly: " + err.message,
                        confirmText: "Close"
                    });
                })
                .deleteQidRowBackend(slNo);
        }
    });
}

/**
 * Modernized Modifier Module: Opens the editing modal and auto-populates old data values
 */
function actionModifyQidUser(slNo) {
    // Locate target profile within your local globally stored array matrix cache
    const targetRecord = globalQidDataStore.find(function(u) { return parseInt(u.slNo) === parseInt(slNo); });
    if (!targetRecord) {
        alert("Unable to cross-reference file verification data.");
        return;
    }
    
    // Inject values securely into form elements
    document.getElementById('editQidSlNo').value = targetRecord.slNo;
    document.getElementById('editQidName').value = targetRecord.name || "";
    document.getElementById('editQidDocNo').value = targetRecord.idNo || "";
    
    // Sanitize phone number before showing it in the edit input line
    let cleanPhoneDisplay = (targetRecord.phone || "").toString().replace(/^\+91/, "").replace(/\s+/g, "");
    document.getElementById('editQidPhone').value = cleanPhoneDisplay;
    
    // Fire up the modal overlay element frame cleanly
    const editModalEl = document.getElementById('qidEditUserModal');
    const modalInstance = bootstrap.Modal.getOrCreateInstance(editModalEl);
    modalInstance.show();
}

/**
 * Serializes, sanitizes, and sends profile updates to the spreadsheet ledger
 */
function submitQidProfileEdits() {
    const slNo = document.getElementById('editQidSlNo').value;
    const rawName = document.getElementById('editQidName').value;
    const rawPhone = document.getElementById('editQidPhone').value;
    const rawDocNo = document.getElementById('editQidDocNo').value;
    
    // --- SYSTEM CORRECTION PRESETS: Strict normalization enforcement ---
    // Instantly strip trailing spaces, +91 prefixes, and inner dashes
    const sanitizedName = rawName.trim();
    const sanitizedDocNo = rawDocNo.trim();
    const sanitizedPhone = rawPhone.toString().replace(/^\+91/, "").replace(/[-\s()]+/g, "").trim();
    
    const saveButton = document.getElementById('btnQidEditSave');
    saveButton.disabled = true;
    saveButton.innerHTML = `<span class="spinner-border spinner-border-sm me-1" role="status"></span> Saving...`;
    
    // Fire network call upstream to modify backend data indexes
    google.script.run
        .withSuccessHandler(function(response) {
            saveButton.disabled = false;
            saveButton.innerText = "Save Changes";
            
            // Dismiss the active edit layer panel modal dynamically
            const editModalEl = document.getElementById('qidEditUserModal');
            bootstrap.Modal.getOrCreateInstance(editModalEl).hide();
            
            console.log(">>> [UPDATE QID PROFILES COMPLETED]", response);
            openQidHubModal(); // Dynamically re-fetch rows and refresh the dashboard grid
        })
        .withFailureHandler(function(err) {
            saveButton.disabled = false;
            saveButton.innerText = "Save Changes";
            
            showQidActionPrompt({
                type: "danger",
                title: "Modification Aborted",
                message: "Internal ledger synchronization failed: " + err.message,
                confirmText: "Close"
            });
        })
        .modifyQidRowBackend(slNo, { 
            name: sanitizedName, 
            phone: sanitizedPhone,
            idNo: sanitizedDocNo
        });
}

/**
 * Intercept Google Drive URLs and pipe them directly into an in-app lightbox frame
 */
function launchSecureQidPreview(rawUrl) {
    if (!rawUrl || rawUrl.trim() === "" || rawUrl.indexOf("-") === 0) {
        alert("No valid media proof link attached to this validation profile.");
        return;
    }
    
    const previewModalEl = document.getElementById('qidPreviewModal');
    const imageFrame = document.getElementById('qidPreviewImageFrame');
    const spinner = document.getElementById('qidPreviewImageSpinner');
    const modalInstance = bootstrap.Modal.getOrCreateInstance(previewModalEl);
    
    // 1. Enter Loading State & Display Lightbox Framework instantly
    imageFrame.style.opacity = "0.0";
    spinner.classList.remove('d-none');
    modalInstance.show();
    
    // 2. Run the secure internal file stream call
    google.script.run
        .withSuccessHandler(function(base64DataStream) {
            spinner.classList.add('d-none');
            
            if (!base64DataStream || base64DataStream === "ERROR") {
                alert("Google Drive security layer blocked raw URL streaming. Please verify the spreadsheet file layout.");
                return;
            }
            
            // 3. Inject the safe binary data string directly into the image element
            imageFrame.src = base64DataStream;
            imageFrame.style.opacity = "1";
        })
        .withFailureHandler(function(err) {
            spinner.classList.add('d-none');
            imageFrame.style.opacity = "1";
            alert("System Transmission Failure: " + err.message);
        })
        .getDriveImageAsBase64(rawUrl);
}

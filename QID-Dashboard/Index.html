<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <?!= include('Styles'); ?>
</head>

<body>
  <div class="header-banner shadow-sm">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold text-white">Vinyasa Nilaya Dashboard</h5>
      <div class="badge bg-white text-primary rounded-pill px-3 py-2" id="period-label">2026</div>
    </div>
  </div>

  <div class="container mt-n4">
    <div class="row g-3 mb-4">
      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0 bg-white">
          <div class="text-muted small mb-1">Total Amount</div>
          <h3 id="stat-revenue" class="fw-bold mb-0 text-dark">₹0</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0 bg-white">
          <div class="text-muted small mb-1">Check-ins</div>
          <h3 id="stat-count" class="fw-bold mb-0 text-dark">0</h3>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 mb-4 overflow-auto pb-2" style="white-space: nowrap;">
      <select id="filterYear" class="filter-pill" onchange="loadDashboard()">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
      <select id="filterMonth" class="filter-pill" onchange="loadDashboard()">
          <option value="">All Months</option>
          <option value="January">January</option>
          <option value="February">February</option>
          <option value="March">March</option>
          <option value="April">April</option>
          <option value="May">May</option>
          <option value="June">June</option>
          <option value="July">July</option>
          <option value="August">August</option>
          <option value="September">September</option>
          <option value="October">October</option>
          <option value="November">November</option>
          <option value="December">December</option>
        </select>
    </div>

    <div id="guest-feed" class="pb-5">
      <div class="text-center py-5">
        <div class="spinner-border text-primary opacity-25" role="status"></div>
      </div>
    </div>
  </div>

  <button class="fab shadow-lg" onclick="showAddGuestModal()">
      <i class="bi bi-plus-lg"></i>
    </button>

  <?!= include('Scripts'); ?>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <?!= include('Styles'); ?>
</head>

<body>

  <div class="header-banner shadow-sm"
    style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); padding-bottom: 24px;">
    <div class="container pt-3">

      <div class="d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-bold text-white">Vinyasa Nilaya Dashboard</h5>

        <div class="d-flex align-items-center gap-2">

          <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm border-0"
                  id="refresh-dashboard-btn"
                  onclick="refreshDashboardData()"
                  data-bs-toggle="tooltip"
                  data-bs-placement="bottom"
                  data-bs-title="Refresh Guests"
                  style="width: 34px; height: 34px; border: none;">
            <i class="bi bi-arrow-clockwise text-primary fs-5" id="refresh-icon"></i>
            <span class="spinner-border spinner-border-sm text-primary d-none" id="refresh-spinner" role="status" style="width: 14px; height: 14px;"></span>
          </button>

          <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm border-0"
                  id="sync-btn"
                  onclick="triggerAirbnbSync()"
                  data-bs-toggle="tooltip"
                  data-bs-placement="bottom"
                  data-bs-title="Sync Airbnb Bookings"
                  style="width: 34px; height: 34px; border: none;">
            <i class="bi bi-arrow-repeat text-primary fs-5" id="sync-icon"></i>
            <span class="spinner-border spinner-border-sm text-primary d-none" id="sync-spinner" role="status"></span>
          </button>

        </div>
      </div>

      <div class="mt-2 d-flex align-items-center">
        <div class="badge rounded-pill fw-semibold shadow-sm text-start" id="period-label"
          style="background-color: rgba(255, 255, 255, 0.2); color: #ffffff; padding: 6px 14px; font-size: 11px; letter-spacing: 0.4px; border: 1px solid rgba(255, 255, 255, 0.1); display: inline-block; max-width: 100%; white-space: normal; word-break: break-word;">
          Initializing...
        </div>
      </div>

    </div>
  </div>


  <div class="container mt-n4">
    <div class="row g-2 mb-2">
      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0 bg-white"
          style="border-radius: 14px; border-left: 4px solid #4a5568 !important;">
          <div class="fw-bold text-uppercase mb-1"
            style="font-size: 10px; letter-spacing: 0.8px; color: #718096 !important;">
            Period Revenue
          </div>
          <h3 id="stat-revenue" class="fw-bold mb-0 text-dark"
            style="font-size: calc(1.2rem + 0.4vw); letter-spacing: -0.5px;">₹0</h3>
        </div>
      </div>

      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0 bg-white"
          style="border-radius: 14px; border-left: 4px solid #4a5568 !important;">
          <div class="fw-bold text-uppercase mb-1"
            style="font-size: 10px; letter-spacing: 0.8px; color: #718096 !important;">
            Period Check-Ins
          </div>
          <h3 id="stat-count" class="fw-bold mb-0 text-dark"
            style="font-size: calc(1.2rem + 0.4vw); letter-spacing: -0.5px;">0</h3>
        </div>
      </div>
    </div>

    <div class="row g-2 mb-4">
      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0"
          style="border-radius: 14px; border-left: 4px solid #0d6efd !important; background: linear-gradient(145deg, #ffffff, #f4f7ff);">
          <div class="fw-bold text-uppercase mb-1"
            style="font-size: 10px; letter-spacing: 0.8px; color: #0d6efd !important;">
            All-Time Total
          </div>
          <h3 id="stat-lifetime-revenue" class="fw-bold mb-0 text-primary"
            style="font-size: calc(1.2rem + 0.4vw); letter-spacing: -0.5px;">₹0</h3>
        </div>
      </div>

      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0"
          style="border-radius: 14px; border-left: 4px solid #0d6efd !important; background: linear-gradient(145deg, #ffffff, #f4f7ff);">
          <div class="fw-bold text-uppercase mb-1"
            style="font-size: 10px; letter-spacing: 0.8px; color: #0d6efd !important;">
            All-Time Check-Ins
          </div>
          <h3 id="stat-lifetime-count" class="fw-bold mb-0 text-primary"
            style="font-size: calc(1.2rem + 0.4vw); letter-spacing: -0.5px;">0</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex gap-2 mb-4 overflow-auto pb-2" style="white-space: nowrap;">
    <select id="filterYear" class="filter-pill" onchange="refreshDashboardData()">
      </select>
    <select id="filterMonth" class="filter-pill" onchange="handleMonthChange()">
        <option value="All">All Months</option>
      </select>
    <select id="filterSource" class="filter-pill" onchange="handleFilterChange()">
        <option value="All">All Sources</option>
        <option value="Airbnb">Airbnb</option>
        <option value="Personal">Personal</option>
      </select>
    <select id="filterFloor" class="filter-pill" onchange="handleFilterChange()">
        <option value="All">All Floors</option>
        <option value="Ground Floor">Ground Floor</option>
        <option value="Second Floor">Second Floor</option>
      </select>

  </div>

  <div id="guest-feed" class="pb-5">
    <div class="text-center py-5">
      <div class="spinner-border text-primary opacity-25" role="status"></div>
    </div>
  </div>
  </div>

  <button class="fab shadow-lg" onclick="openAddModal()">
      <i class="bi bi-plus-lg"></i>
  </button>

  <div class="modal fade" id="syncResultModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
        <div class="modal-body text-center p-4">
          <div class="mb-3 d-inline-flex align-items-center justify-content-center bg-success-subtle rounded-circle"
            style="width: 60px; height: 60px;">
            <i class="bi bi-cloud-check-fill text-success" style="font-size: 30px;"></i>
          </div>

          <h5 class="fw-bold text-dark mb-2" id="syncModalTitle">Dashboard Updated</h5>

          <p class="text-muted small mb-4" id="syncModalMessage">Your properties and email confirmations are fully
            synchronized.</p>

          <button type="button" class="btn btn-primary w-100 fw-semibold" data-bs-dismiss="modal" style="border-radius: 10px; padding: 10px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border: none;">
          Acknowledge
        </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="guestFormModal" data-bs-backdrop="static" tabindex="-1"
    aria-labelledby="guestFormModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
      <div class="modal-content border-0 shadow" style="border-radius: 16px;">

        <div class="modal-header border-0 pb-0 pt-4 px-4">
          <h5 class="modal-title fw-bold text-dark" id="guestFormModalLabel">Guest Registration</h5>
          <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <form id="guestCrudForm" onsubmit="handleFormSubmit(event)">
          <div class="modal-body px-4 pt-3" style="max-height: 70vh; overflow-y: auto;">

            <input type="hidden" id="formMode" value="ADD">
            <input type="hidden" id="formRowIndex" value="">

            <div class="row g-3">
              <div class="col-12">
                <label class="form-label small fw-bold text-muted mb-1">Guest Name</label>
                <input type="text" id="inputName" class="form-control rounded-3" required placeholder="John Doe">
              </div>

              <div class="col-12">
                <label class="form-label small fw-bold text-muted mb-1">Mobile Number (Without country code)</label>
                <input type="tel" id="inputMobile" class="form-control rounded-3" placeholder="9876543210">
              </div>

              <div class="col-6">
                <label class="form-label small fw-bold text-muted mb-1">Amount Paid (₹)</label>
                <input type="number" id="inputAmount" class="form-control rounded-3" required placeholder="0">
              </div>
              <div class="col-6">
                <label class="form-label small fw-bold text-muted mb-1">Total Guests</label>
                <input type="number" id="inputGuestsCount" class="form-control rounded-3" required min="1" value="1">
              </div>

              <div class="col-6">
                <label class="form-label small fw-bold text-muted mb-1">Check-In Date</label>
                <input type="date" id="inputCheckIn" class="form-control rounded-3" required>
              </div>
              <div class="col-6">
                <label class="form-label small fw-bold text-muted mb-1">Duration (Nights)</label>
                <input type="number" id="inputDays" class="form-control rounded-3" required min="1" value="1">
              </div>

              <div class="col-6">
                <label class="form-label small fw-bold text-muted mb-1">Booking Source</label>
                <select id="inputSource" class="form-select rounded-3" required>
                <option value="Airbnb">Airbnb</option>
                <option value="Personal">Personal</option>
              </select>
              </div>

              <div class="col-6">
                <label class="form-label small fw-bold text-muted mb-1">Floor Assignment</label>
                <select id="inputFloor" class="form-select rounded-3" required>
                <option value="Ground Floor">Ground Floor</option>
                <option value="Second Floor">Second Floor</option>
              </select>
              </div>

              <div class="col-12">
                <label class="form-label small fw-bold text-muted mb-1">Customer Ratings</label>
                <select id="inputRatings" class="form-select rounded-3">
                <option value="">No Rating Given</option>
                <option value="⭐⭐⭐⭐⭐">5 Stars (⭐⭐⭐⭐⭐)</option>
                <option value="⭐⭐⭐⭐">4 Stars (⭐⭐⭐⭐)</option>
                <option value="⭐⭐⭐">3 Stars (⭐⭐⭐)</option>
                <option value="⭐⭐">2 Stars (⭐⭐)</option>
                <option value="⭐">1 Star (⭐)</option>
              </select>
              </div>

              <div class="col-12">
                <label class="form-label small fw-bold text-muted mb-1">Operational Notes / Comments</label>
                <textarea id="inputComments" class="form-control rounded-3" rows="2" placeholder="Add entry notes here..."></textarea>
              </div>
            </div>

          </div>

          <div class="modal-footer border-0 pt-3 pb-4 px-4 d-flex gap-2">
            <button type="button" class="btn btn-light rounded-3 px-4 flex-grow-1 fw-semibold text-secondary border" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" id="formSubmitBtn" class="btn btn-primary rounded-3 px-4 flex-grow-1 fw-semibold" style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border: none;">
            Save Record
          </button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <?!= include('Scripts'); ?>
</body>

</html>

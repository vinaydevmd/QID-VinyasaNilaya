<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <?!= include('Styles'); ?>
</head>

<body>
  <div class="header-banner shadow-sm" style="background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <h5 class="mb-0 fw-bold text-white">Vinyasa Nilaya Dashboard</h5>
      
      <div class="d-flex align-items-center gap-2">
        <div class="badge bg-white text-primary rounded-pill px-3 py-2 fw-semibold" id="period-label">2026</div>
        
        <button class="btn btn-light btn-sm rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm" 
          id="sync-btn" 
          onclick="triggerAirbnbSync()" 
          data-bs-toggle="tooltip" 
          data-bs-placement="bottom" 
          data-bs-title="Sync Airbnb Bookings" 
          style="width: 34px; height: 34px; border: none;">
            <i class="bi bi-arrow-repeat text-primary fs-5" id="sync-icon"></i>
          <span class="spinner-border spinner-border-sm text-primary d-none" id="sync-spinner" role="status"></span>
        </button>
      </div>
    </div>
  </div>

  <div class="container mt-n4">
    <div class="row g-3 mb-4">
      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0 bg-white">
          <div class="text-muted small mb-1">Total Amount</div>
          <h3 id="stat-revenue" class="fw-bold mb-0 text-dark">₹0</h3>
        </div>
      </div>
      <div class="col-6">
        <div class="stat-card shadow-sm p-3 border-0 bg-white">
          <div class="text-muted small mb-1">Check-ins</div>
          <h3 id="stat-count" class="fw-bold mb-0 text-dark">0</h3>
        </div>
      </div>
    </div>

    <div class="d-flex gap-2 mb-4 overflow-auto pb-2" style="white-space: nowrap;">
      <select id="filterYear" class="filter-pill" onchange="refreshDashboardData()">
      </select>
      <select id="filterMonth" class="filter-pill" onchange="handleMonthChange()">
      <option value="All">All Months</option>
      </select>

      <button class="btn btn-light btn-sm rounded-3 d-flex align-items-center justify-content-center p-0  shadow-sm border-0" 
          id="refresh-dashboard-btn" 
          onclick="refreshDashboardData()" 
          data-bs-toggle="tooltip" 
          data-bs-placement="bottom" 
          data-bs-title="Refresh Guests" 
          style="width: 32px; height: 32px; background-color: #ffffff;">
        <i class="bi bi-arrow-clockwise text-muted fs-6" id="refresh-icon"></i>
        <span class="spinner-border spinner-border-sm text-muted d-none" id="refresh-spinner" role="status" style="width: 14px; height: 14px;"></span>
      </button>
    </div>

    <div id="guest-feed" class="pb-5">
      <div class="text-center py-5">
        <div class="spinner-border text-primary opacity-25" role="status"></div>
      </div>
    </div>
  </div>

  <button class="fab shadow-lg" onclick="showAddGuestModal()">
      <i class="bi bi-plus-lg"></i>
  </button>

  <div class="modal fade" id="syncResultModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
      <div class="modal-body text-center p-4">
        <div class="mb-3 d-inline-flex align-items-center justify-content-center bg-success-subtle rounded-circle" style="width: 60px; height: 60px;">
          <i class="bi bi-cloud-check-fill text-success" style="font-size: 30px;"></i>
        </div>
        
        <h5 class="fw-bold text-dark mb-2" id="syncModalTitle">Dashboard Updated</h5>
        
        <p class="text-muted small mb-4" id="syncModalMessage">Your properties and email confirmations are fully synchronized.</p>
        
        <button type="button" class="btn btn-primary w-100 fw-semibold" data-bs-dismiss="modal" style="border-radius: 10px; padding: 10px; background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); border: none;">
          Acknowledge
        </button>
      </div>
    </div>
  </div>
</div>

  <?!= include('Scripts'); ?>
</body>

</html>

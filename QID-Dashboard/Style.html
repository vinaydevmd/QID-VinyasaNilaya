<style>
  :root {
    --primary: #2c3e50;
    --accent: #27ae60;
  }

  body {

  }

  .header-banner {
    background: var(--primary);
    height: 120px;
    border-radius: 0 0 25px 25px;
  }

  .mt-n4 {
    margin-top: -40px;
  }

  .stat-card {
    border-radius: 18px;
  }

  .filter-pill {
    background: white;
    border: 1px solid #dee2e6;

    padding: 6px 15px;
    font-size: 0.85rem;

    outline: none;
  }

    border-radius: 18px;
    border: none;
    margin-bottom: 12px;
    transition: 0.2s;
  }

    text-transform: uppercase;

    background: #ff5a5f15;
    color: #ff5a5f;
  }

  .tag-personal {
    background: #27ae6015;
    color: #27ae60;
  }

  .fab {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 60px;
    height: 60px;
    background: var(--accent);
    color: white;
    border-radius: 50%;
    border: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .guest-card {
    border-radius: 16px;
    background: #ffffff;
    transition: transform 0.2s ease;
  }

  .guest-card:hover {
    transform: translateY(-2px);
  }

  .source-tag {
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
  }

  .tag-airbnb {
    background-color: #FF5A5F20;
    color: #FF5A5F;
  }

  .tag-personal {
    background-color: #27ae6020;
    color: #27ae60;
  }

  .font-italic {
    font-style: italic;
  }

  .text-primary {
    color: #004d40 !important;
  }

  /* Vinyasa Nilaya Dark Green */

  #guest-feed {
    padding: 10px 0;
  }

  .bg-success-subtle {
    background-color: #d1e7dd;
  }

  .text-success {
    color: #0f5132 !important;
  }

  .btn-success {
    background-color: #25D366;
    border: none;
  }

  /* Official WhatsApp Green */
  .btn-success:hover {
    background-color: #128C7E;
  }

    border-left: 1px dashed #dee2e6 !important;

<style>
  :root {

    --vg-amber: #E89F22;
    --vg-cream: #FAF9F6;
    --border-light: #e0d7c6;
    --disabled-tan: #d2b48c;
  }

  body {

    font-family: Verdana, Geneva, sans-serif;
    color: #333;
  }

  .hidden {
    display: none !important;
  }

  /* CARDS */

    box-shadow: 0 4px 12px rgba(99, 65, 33, 0.05);

    width: 100%;
    object-fit: cover;
    background: #f9f9f9;
  }

  #cart-sidebar {

    border-radius: 15px;

    color: white !important;

    opacity: 0.8;
    cursor: not-allowed;
  }

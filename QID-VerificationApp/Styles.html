<style>
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success: #059669;
    --bg: #f3f4f6;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
  }

  body {
    background-color: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 0; /* Changed to 0 to let container handle centering */
  }

  .container {
    max-width: 480px;
    margin: 2rem auto;
    padding: 20px;
  }

  .verification-card {
    background: var(--card-bg);
    padding: 2.5rem;
    border-radius: 24px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text-main);
    letter-spacing: -0.025em;
  }

  .header p {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .form-group {
    margin-bottom: 1.5rem;
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
    color: var(--text-main);
  }

  .form-control, .form-select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #d1d5db;
    border-radius: 12px;
    font-size: 1rem;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .form-control:focus, .form-select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  /* DigiLocker Button */
  .btn-digilocker {
    background-color: #fff;
    border: 2px solid #e5e7eb;
    color: #374151;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 0.75rem;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-digilocker:hover {
    background-color: #f9fafb;
    border-color: var(--primary);
    color: var(--primary);
  }

  /* Camera & Preview Styling */
  #video-wrapper, #preview-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 1rem;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }

  video, #photo-preview {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  video {
    transform: scaleX(-1);
  }

  .capture-overlay {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  .btn-capture {
    background: #ffffff;
    border: 5px solid rgba(37, 99, 235, 0.3);
    width: 60px;
    height: 60px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .btn-capture:active {
    transform: translateX(-50%) scale(0.9);
  }

  /* Primary Action Button */
  .btn-submit {
    background-color: var(--primary);
    color: white;
    width: 100%;
    padding: 1rem;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 2rem;
    transition: all 0.2s;
    box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
  }

  .btn-submit:hover:not(:disabled) {
    background-color: var(--primary-hover);
    transform: translateY(-1px);
  }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    filter: grayscale(0.5);
  }

  /* Update this in your Styles.html */
  .btn-success:disabled {
    background-color: #198754; /* Standard Bootstrap Success Green */
    border-color: #198754;
    opacity: 0.6;              /* This creates the 'disabled' faded look */
    cursor: not-allowed;
    filter: none;              /* Ensure no grayscale filter is turning it grey */
    color: white;
  }

  .badge-verified {
    background: #d1fae5;
    color: var(--success);
    padding: 0.4rem 0.8rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 0.75rem;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .d-none { display: none !important; }

  /* Utility for the "Retake" link */
  .btn-link {
    color: var(--text-muted);
    font-size: 0.8rem;
    text-decoration: underline;
    background: none;
    border: none;
    cursor: pointer;
    display: block;
    margin: 0.5rem auto 0;
  }

  .upload-box {
  cursor: pointer;
  background: #ffffff;
  border: 2px dashed #dee2e6;
  border-radius: 12px;
  overflow: hidden; /* CRITICAL: Clips anything outside the box */
  position: relative;
  aspect-ratio: 4 / 3; /* Maintains a consistent shape on all screens */
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}

.upload-box:hover {
  border-color: #0d6efd;
  background-color: #f8f9fa;
}

/* This targets the dynamic image created by your JS */
.preview-container img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Fits image inside without distortion, cropping if needed */
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 10px;
}

.preview-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

  /* Responsive tweaks */
  @media (max-width: 576px) {
    .upload-box { height: 120px; }
  }

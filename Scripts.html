<script>
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const photoPreview = document.getElementById('photo-preview');
  const videoContainer = document.getElementById('video-container');
  let selfieBase64 = null;

  /**
   * Initialize Camera on page load
   */
  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user" } 
      });
      video.srcObject = stream;
    } catch (err) {
      console.error("Camera error: ", err);
      alert("Please allow camera access to take a selfie for verification.");
    }
  }

  /**
   * Capture selfie from video stream
   */
  function capture() {
    const context = canvas.getContext('2d');
    // Maintain aspect ratio
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    selfieBase64 = canvas.toDataURL('image/jpeg');
    photoPreview.src = selfieBase64;
    
    // UI Swapping
    photoPreview.classList.remove('d-none');
    videoContainer.classList.add('d-none');
  }

  /**
   * Reset capture to take photo again
   */
  function retakePhoto() {
    selfieBase64 = null;
    photoPreview.classList.add('d-none');
    videoContainer.classList.remove('d-none');
  }

  /**
   * Update ID Input placeholder based on selection
   */
  function toggleIDPlaceholder() {
    const type = document.getElementById('idType').value;
    document.getElementById('idLabel').innerText = type + " Number";
    document.getElementById('idNumber').placeholder = "Enter " + type + " Number";
  }

  /**
   * DigiLocker Authorization Flow
   */
  function startDigiLocker() {
    const idNum = document.getElementById('idNumber').value;
    if (!idNum) {
      alert("Please enter your ID number before verifying.");
      return;
    }

    google.script.run.withSuccessHandler(function(url) {
      if (url && url !== "#") {
        const authWin = window.open(url, "_blank", "width=600,height=700");
      } else {
        // Simulation mode
        alert("DigiLocker connection simulated successfully.");
      }
      
      // Update UI to show verification success
      document.getElementById('verifyBadge').classList.remove('d-none');
    }).getDigiLockerLoginUrl();
  }

  /**
   * Final Submission to Google Sheets/Drive
   */
  function submitData() {
    const btn = document.getElementById('submitBtn');
    const data = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      arrival: document.getElementById('arrival').value,
      idType: document.getElementById('idType').value,
      idNumber: document.getElementById('idNumber').value,
      terms: document.getElementById('terms').checked,
      selfie: selfieBase64
    };

    // Validation
    if (!data.name || !data.idNumber || !selfieBase64) {
      alert("Please complete all fields, verify your ID, and capture a selfie.");
      return;
    }
    if (!data.terms) {
      alert("Please accept the Terms and Conditions.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing...';

    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          document.getElementById('formStep').innerHTML = `
            <div class="text-center py-4">
              <h3 class="text-success">✓ Success!</h3>
              <p>${res.message}</p>
              <button class="btn btn-outline-primary btn-sm" onclick="window.location.reload()">New Registration</button>
            </div>`;
        } else {
          alert("Error: " + res.message);
          btn.disabled = false;
          btn.innerHTML = "Complete Booking";
        }
      })
      .processSubmission(data);
  }

  async function extractAadhaarDetails() {
  const fileInput = document.getElementById('aadhaarFront');
  if (!fileInput.files[0]) return alert("Please select the Front of your Aadhaar first.");

  const btn = document.querySelector('button[onclick="extractAadhaarDetails()"]');
  btn.innerText = "Scanning...";
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64 = e.target.result;
    
    google.script.run.withSuccessHandler(rawText => {
      google.script.run.withSuccessHandler(result => {
        // Auto-fill the form fields
        if(result.name) document.getElementById('name').value = result.name;
        if(result.idNumber) document.getElementById('idNumber').value = result.idNumber;
        
        btn.innerText = "Scan Complete";
        alert("Details extracted! Please verify them for accuracy.");
      }).parseAadhaarData(rawText);
    }).extractTextFromImage(base64);
  };
  reader.readAsDataURL(fileInput.files[0]);
}

function handleIdScan() {
  const frontFile = document.getElementById('idFront').files[0];
  if (!frontFile) {
    alert("Please select the front side of your ID.");
    return;
  }

  // UI Feedback
  const btn = document.getElementById('scanBtn');
  const spinner = document.getElementById('scanSpinner');
  btn.disabled = true;
  spinner.classList.remove('d-none');

  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Data = e.target.result; // This is the full DataURL

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled = false;
        spinner.classList.add('d-none');

        if (res && res.name !== "Not found") {
          document.getElementById('ocrConfirmation').classList.remove('d-none');
          document.getElementById('name').value = res.name;
          document.getElementById('idNumber').value = res.idNumber;
          alert("ID read successfully! Please verify the details below.");
        } else {
          alert("Could not read details clearly. Please try a clearer photo or enter details manually.");
          document.getElementById('ocrConfirmation').classList.remove('d-none');
        }
      })
      .withFailureHandler(function(err) {
        btn.disabled = false;
        spinner.classList.add('d-none');
        
        if (err.message.includes("rate limit exceeded")) {
          alert("The ID scanner is currently busy. Please type your Name and ID Number manually below.");
          // Force show the manual entry box
          document.getElementById('ocrConfirmation').classList.remove('d-none');
        } else {
          alert("Scan failed: " + err);
        }
      })
      .executeOcrFlow(base64Data); // Calling a combined wrapper function
  };
  reader.readAsDataURL(frontFile);
}

function handlePreview(input, previewId) {
  const container = document.getElementById(previewId);
  const file = input.files[0];
  
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      container.innerHTML = `<img src="${e.target.result}" class="preview-image">
                             <p class="small text-success mt-2 mb-0">Image Loaded ✓</p>`;
    };
    reader.readAsDataURL(file);
  }
}

function handleIdScan() {
  const frontFile = document.getElementById('idFront').files[0];
  if (!frontFile) return alert("Please upload/capture ID Front first.");

        // Fill fields (allowing user to edit if "Not found")
        document.getElementById('name').value = (res.name !== "Not found") ? res.name : "";
        document.getElementById('idNumber').value = res.idNumber || "";
        
        btn.disabled = false;
        spinner.classList.add('d-none');
        btn.innerText = "Scan Complete ✓";
        btn.className = "btn btn-success w-100 mb-3";
      })
      .executeOcrFlow(e.target.result);
  };
  reader.readAsDataURL(frontFile);
}


function calculateNights() {
  const checkIn = document.getElementById('checkIn').value;
  const checkOut = document.getElementById('checkOut').value;
  const display = document.getElementById('stayDuration');
  const countSpan = document.getElementById('nightCount');

  if (checkIn && checkOut) {
    const d1 = new Date(checkIn);
    const d2 = new Date(checkOut);
    
    // Calculate difference in milliseconds and convert to days
    const diffTime = d2 - d1;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    if (diffDays > 0) {
      countSpan.innerText = diffDays;
      display.classList.remove('d-none');
    } else {
      display.classList.add('d-none');
      if (diffDays <= 0 && checkOut !== "") {
        alert("Check-out date must be after Check-in date.");
        document.getElementById('checkOut').value = "";
      }
    }
  }
}

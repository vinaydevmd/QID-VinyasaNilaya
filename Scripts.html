<script>
  let currentUser = null, fullInventory = [], cart = [], currentOrderId = "";
  let verificationRetries = 0;
  let isGiftOrder = false; 
  let salesDiscountEnabled = false; 
  let manualPaymentMode = null;
  let vkPaymentMode = null; 
  let manualTxnId = null;

  // Global State for Sales Mode

  const successModal = new bootstrap.Modal(document.getElementById('successModal'));

  function showAlert(message, type = 'success') {
    const toastContainer = document.getElementById('custom-toast');
    const toastMsg = document.getElementById('toast-msg');
    
    // Reset classes
    toastMsg.classList.remove('alert-vg-success', 'alert-danger');
    
    // Apply class based on type
    if (type === 'error') {
      toastMsg.classList.add('alert-danger');
    } else {
      toastMsg.classList.add('alert-vg-success');
    }
    
    toastMsg.innerText = message;
    toastContainer.style.display = 'block';
    
    setTimeout(() => {
      toastContainer.style.display = 'none';
    }, 3000);
  }
  
  window.onload = () => {
    // 1. Run data fetch first
    loadInitialData();
    
    // 2. Then set up listeners
    const loginForm = document.getElementById('login-form-container');
    if (loginForm) {
      loginForm.addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') doLogin(); 
      });
    }

    document.addEventListener('change', function(e) {
      // Check if the change happened on the screenshot file input
      if (e.target && e.target.id === 'screenshot-file') {
        const btn = document.getElementById('place-order-btn');
        const err = document.getElementById('verify-error');
        
        // Check if at least one file was actually selected
        if (e.target.files && e.target.files.length > 0) {
          // 1. Enable the button
          btn.classList.remove('disabled');
          btn.disabled = false;
          
          // 2. Ensure it uses your vg-brown theme color
          btn.style.setProperty("background-color", "var(--vg-brown)", "important");
          
          // 3. Update the message to let the user know they are good to go
          err.style.color = "#E89F22"; // vg-amber
          err.innerHTML = "<strong>📸 Screenshot attached!</strong> You can now Place Order.";
        } else {
          // If they cleared the file, lock the button again
          btn.classList.add('disabled');
          btn.disabled = true;
        }
      }
    });

    // Add this inside window.onload in scripts.html
    const searchBar = document.getElementById('search-bar');
    if (searchBar) {
      searchBar.addEventListener('keypress', (e) => {
        // 13 is the 'Enter' key, which almost all barcode guns send after a scan
        if (e.key === 'Enter') {
          const sku = searchBar.value.trim();
          if (sku.length > 2) {
            handleScannedItem(sku); // Reusing your existing logic
            searchBar.value = "";   // CLEAR for next item immediately
            e.preventDefault();     // Prevent form submission/refresh
          }
        }
      });
    }

  };

  function loadInitialData() {
    const v = document.getElementById('varga');
    const n = document.getElementById('name');
    v.disabled = true;
    v.innerHTML = '<option value="">Loading Varga...</option>';
    n.disabled = true;
    n.innerHTML = '<option value="">Select Varga first</option>';
    google.script.run.withSuccessHandler(vargas => {
      v.innerHTML = '<option value="">Select Varga</option>';
      vargas.forEach(item => v.add(new Option(item, item)));
      v.disabled = false;
    }).getVargas();
  }

  function fetchNames() {
    const v = document.getElementById('varga').value;
    const n = document.getElementById('name');
    if (!v) { n.innerHTML = '<option value="">Select Varga first</option>'; n.disabled = true; return; }
    n.disabled = true;
    n.innerHTML = '<option value="">Loading names...</option>';
    google.script.run.withSuccessHandler(names => {
      n.innerHTML = '<option value="">Select Name</option>';
      names.forEach(item => n.add(new Option(item, item)));
      n.disabled = false;
    }).getNamesByVarga(v);
  }
  
  function doLogin() {
    const m = document.getElementById('mobile').value;
    const loginBtn = document.getElementById('login-btn');
    
    // Basic Mobile Validation
    if (!m || m.length < 10) return showAlert("Enter a valid mobile number", "error");

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="loader"></span> Authenticating...';

    if (currentMode === 'guest') {
      // --- GUEST PATH ---
      const ev = document.getElementById('event').value;
      const month = document.getElementById('guest-month').value;
      const gn = document.getElementById('guest-name-input').value;
      const asc = document.getElementById('future-associate').checked;

      if (!ev || !month || !gn) {
        resetLoginBtn(loginBtn);
        return showAlert("Fill all guest fields", "error");
      }

      google.script.run.withSuccessHandler(res => {
        if (res.success) { currentUser = res; startShop(); }
        else { showAlert("Registration Failed", "error"); resetLoginBtn(loginBtn); }
      }).registerGuest(ev,month, gn, m, asc);

    } else {
      // --- PARENT PATH ---
      const v = document.getElementById('varga').value;
      const n = document.getElementById('name').value;

      if (!v || !n) {
        resetLoginBtn(loginBtn);
        return showAlert("Select Varga and Name", "error");
      }

      google.script.run.withSuccessHandler(res => {
        if (res.success) { currentUser = res; startShop(); }
        else { showAlert("Invalid Login Details", "error"); resetLoginBtn(loginBtn); }
      }).validateLogin(v, n, m);
    }
  }

  // Helper to clean up the button state on failure
  function resetLoginBtn(btn) {
    btn.disabled = false;
    btn.innerText = "Login";
  }
  
  function startShop() {
    document.getElementById('login-section').classList.add('hidden');
    document.getElementById('shop-section').classList.remove('hidden');
    document.getElementById('welcome-msg').innerText = "Namaste, " + currentUser.name;
    document.getElementById('disc-label').innerText = `Discount (${currentUser.discount}%):`;
    
    // NEW: Initialize the cart UI to show Balance and Credit immediately
    updateCartUI();
    
    // Trigger the initial data load
    refreshData();
  }

  function refreshData() {
      const refreshBtn = document.querySelector('.btn-vg-refresh');
      const icon = refreshBtn ? refreshBtn.querySelector('.material-icons') : null;
      
      // --- BUG FIX 1: RESET GLOBAL STATE ---
      cart = []; 

      // Reset Verification UI
      const vBox = document.getElementById('verify-box');
      const gate = document.getElementById('payment-gate');
      const input = document.getElementById('txn-id-input');
      const err = document.getElementById('verify-error');
      const placeOrderBtn = document.getElementById('place-order-btn');

      // --- BUG FIX: HIDE MANUAL UPLOAD SECTION ---
      const manualUpload = document.getElementById('manual-upload-section');
      if (manualUpload) {
        manualUpload.style.display = 'none';
        verificationRetries = 0;
      }

      if (vBox) vBox.style.display = 'none';
      if (gate) gate.style.display = 'none';
      if (err) err.innerText = '';
      if (input) {
        input.value = '';
        input.disabled = true;
      }
      if (placeOrderBtn) {
        placeOrderBtn.classList.add('disabled');
        placeOrderBtn.disabled = true;
      }

      // Update the Sidebar to show empty cart immediately
      updateCartUI();

      // Start spin animation and disable button
      if (icon) icon.classList.add('spinning');
      if (refreshBtn) refreshBtn.disabled = true;

      const grid = document.getElementById('inventory-grid');
      grid.innerHTML = '<div class="col-12 text-center py-5"><span class="loader" style="border-color:var(--vg-brown); border-bottom-color:transparent;"></span> Loading Items...</div>';

      google.script.run.withSuccessHandler(data => {
        if (icon) icon.classList.remove('spinning');
        if (refreshBtn) refreshBtn.disabled = false;

        // 1. CHECK IF STORE IS CLOSED
        if (!data || data.length === 0) {
          grid.innerHTML = `
            <div class="col-12">
              <div class="empty-store-banner">
                <div class="empty-store-icon"><i class="material-icons" style="font-size: 80px;">hourglass_empty</i></div>
                <div class="empty-store-title"><span class="decorative-leaf">🌿</span> Preparation in Progress</div>
                <div class="empty-store-text">
                  Please wait till <strong>Vidyagrama</strong> opens the cart.
                </div>
              </div>
            </div>`;
          
          document.querySelector('.row.g-2.mb-3').classList.add('hidden');
          document.getElementById('cart-sidebar').style.opacity = "0.5";
          document.getElementById('cart-sidebar').style.pointerEvents = "none";
          return;
        }

        // 2. NORMAL FLOW
        document.querySelector('.row.g-2.mb-3').classList.remove('hidden');
        document.getElementById('cart-sidebar').style.opacity = "1";
        document.getElementById('cart-sidebar').style.pointerEvents = "auto";

        fullInventory = data;
        
        const mainCatFilter = document.getElementById('main-cat-filter');
        mainCatFilter.innerHTML = '<option value="All">All Inventories</option>';
        
        const mainCats = [...new Set(data.map(i => i.mainCategory))].sort();
        mainCats.forEach(c => {
          mainCatFilter.add(new Option(toTitleCase(c), c));
        });
        
        updateSubCategoryDropdown(); 
        if (currentUser) showAlert("Inventory refreshed & Cart reset! 🌿","success");

      }).getInventoryData();
  }
  
  function updateSubCategoryDropdown() {
    const selectedMain = document.getElementById('main-cat-filter').value;
    const subCatFilter = document.getElementById('sub-cat-filter');
    subCatFilter.innerHTML = '<option value="All">All Sub-Categories</option>';
    const relevantItems = selectedMain === "All" ? fullInventory : fullInventory.filter(i => i.mainCategory === selectedMain);
    const subCats = [...new Set(relevantItems.map(i => i.subCategory))].filter(c => c).sort();
    subCats.forEach(sc => subCatFilter.add(new Option(sc, sc)));
    filterItems();
  }

   function filterItems() {
    const searchBar = document.getElementById('search-bar');
    const mainCatFilter = document.getElementById('main-cat-filter');
    const subCatFilter = document.getElementById('sub-cat-filter');
    const shortageToggle = document.getElementById('shortage-toggle');

    // Safety: If elements aren't loaded yet, don't run
    if (!searchBar || !mainCatFilter || !subCatFilter) return;

    const searchTerm = searchBar.value.toLowerCase();
    const mainCat = mainCatFilter.value;
    const subCat = subCatFilter.value;
    const shortageOnly = shortageToggle ? shortageToggle.checked : false;

    const filtered = fullInventory.filter(i => {
      // 1. Search Filter
      const matchesSearch = i.itemName.toLowerCase().includes(searchTerm) || 
                            (i.sku && i.sku.toLowerCase().includes(searchTerm));
      
      // 2. Category Filters
      const matchesMain = (mainCat === 'All' || i.mainCategory === mainCat);
      const matchesSub = (subCat === 'All' || i.subCategory === subCat);
      
      // 3. Shortage Filter (The Logic Fix)
      // Convert to number; default to 0 if empty/null
      const stockLevel = parseFloat(i.stock) || 0; 
      const isShortageItem = stockLevel <= 5; 
      
      const matchesShortage = shortageOnly ? isShortageItem : true;
      //console.log("Item:", i.itemName, "Stock:", stockLevel, "Is Shortage:", isShortageItem);

      return matchesSearch && matchesMain && matchesSub && matchesShortage;
    });

    renderInventory(filtered);
  }

  function renderInventory(items) {
    const grid = document.getElementById('inventory-grid');

    if (items.length === 0) {
      grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">No items found matching your filters.</div>';
      return;
    }

    grid.innerHTML = items.map(i => {
      const itemMoq = i.moq || 0.5;
      const formattedBadge = toTitleCase(i.mainCategory);
      const stock = parseFloat(i.stock) || 0;
      
      let stockStatus = '';
      let btnText = 'Add';
      let btnClass = 'btn-success'; // Standard green/brown
      let cardClass = '';

      if (stock <= 0) {
        stockStatus = `<span class="badge bg-primary position-absolute top-0 start-0 m-1" style="font-size:0.55rem; z-index:1;">PRE-ORDER</span>`;
        btnText = 'Pre-order';
        btnClass = 'btn-outline-primary'; // Different style for pre-order
        cardClass = 'pre-order-card';
      } else if (stock <= 5) {
        stockStatus = `<span class="badge bg-warning text-dark position-absolute top-0 start-0 m-1" style="font-size:0.55rem; z-index:1;">LOW STOCK: ${stock}</span>`;
        cardClass = 'low-stock-card';
      } else {
        stockStatus = `<span class="badge bg-success position-absolute top-0 start-0 m-1" style="font-size:0.55rem; z-index:1; opacity:0.8;">${stock} IN STOCK</span>`;
      }

      return `
      <div class="col-6 col-md-4">
        <div class="item-card p-2 text-center d-flex flex-column shadow-sm h-100 ${cardClass}" style="position:relative;">
          ${stockStatus}
          <div class="text-end">
            <span class="badge bg-light border" style="font-size:0.6rem; color:var(--vg-brown)">
              ${formattedBadge}
            </span>
          </div>
          <img src="${i.imageUrl}" class="item-img rounded mb-2" onerror="this.src='https://dummyimage.com/150/633a11/ffffff.png&text=Vidyagrama'">
          <div class="small fw-bold text-truncate">${i.itemName}</div>
          <div class="text-muted" style="font-size: 0.65rem;">SKU: ${i.sku}</div>
          <div class="small mb-1" style="color:var(--vg-brown)">₹${parseFloat(i.salePrice).toFixed(2)} / ${i.uom}</div>
          <div class="mt-auto">
            <div class="d-flex gap-1">
              <input type="number" id="qty-${i.sku}" class="form-control form-control-sm" value="${itemMoq}" min="${itemMoq}" step="0.1">
              <button id="btn-${i.sku}" class="btn btn-sm ${btnClass} w-100" onclick="addToCart('${i.sku}')">
                ${btnText}
              </button>
            </div>
            <span class="moq-label">Min: ${itemMoq} ${i.uom}</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function addToCart(sku) {
    const item = fullInventory.find(i => i.sku === sku);
    const qtyInput = document.getElementById('qty-' + sku);
    const addBtn = document.getElementById('btn-' + sku);
    if (!item) return showAlert("Item not found","error");
    const qty = parseFloat(qtyInput.value);
    const minAllowed = item.moq || 0.5;
    if (isNaN(qty) || qty < minAllowed) { showAlert(`Minimum order is ${minAllowed} ${item.uom}`,"error"); return; }
    
    addBtn.classList.add('btn-clicked');
    addBtn.innerText = "Added!";
    
    const cartSidebar = document.getElementById('cart-sidebar');
    cartSidebar.classList.remove('cart-updated');
    void cartSidebar.offsetWidth; 
    cartSidebar.classList.add('cart-updated');
    
    setTimeout(() => { 
      addBtn.classList.remove('btn-clicked'); 
      addBtn.innerText = "Add"; 
    }, 600);
    
    const existingItem = cart.find(cartItem => cartItem.sku === sku);
    if (existingItem) {
      existingItem.quantity = parseFloat((existingItem.quantity + qty).toFixed(2));
      existingItem.fullSubtotal = (existingItem.quantity * parseFloat(existingItem.salePrice)).toFixed(2);
    } else {
      cart.push({ ...item, cartId: Date.now() + Math.random(), quantity: qty, fullSubtotal: (qty * parseFloat(item.salePrice)).toFixed(2) });
    }
    updateCartUI();
  }

  function removeFromCart(id) { cart = cart.filter(i => i.cartId !== id); updateCartUI(); }
  

  function updateCartUI() {
    console.log("--- updateCartUI Triggered ---");
    if (!currentUser) return;

    const isSales = (currentUser.varga === "Sales");
    const toggleContainer = document.getElementById('sales-toggle-container');

    console.log("User Varga:", currentUser.varga);
    console.log("Is Sales User?:", isSales);
    console.log("Toggle Container Found?:", toggleContainer !== null);
        
    // 1. Staff Controls Injection
    if (isSales && toggleContainer) {
      toggleContainer.style.display = 'block';
        toggleContainer.innerHTML = `
            <div class="card mb-3 border-0 shadow-sm" style="background: linear-gradient(145deg, #fffdf5, #fff9e6); border-left: 4px solid #ffc107 !important;">
                <div class="card-body p-2">
                    <div class="d-flex align-items-center mb-2 text-warning">
                        <i class="material-icons" style="font-size:16px;">security</i>
                        <span class="fw-bold ms-1" style="font-size:0.65rem; letter-spacing:1px; text-transform:uppercase;">Staff Controls</span>
                    </div>
                    <div class="form-check form-switch mb-1">
                        <input class="form-check-input" type="checkbox" id="disc-toggle" 
                               ${salesDiscountEnabled ? 'checked' : ''} onchange="toggleSalesDiscount(this)">
                        <label class="form-check-label small" for="disc-toggle">Apply Member Discount</label>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="gift-toggle" 
                               ${isGiftOrder ? 'checked' : ''} onchange="toggleGiftOrder(this)">
                        <label class="form-check-label small text-success fw-bold" for="gift-toggle">Vidyakshetra Gift (₹0)</label>
                    </div>
                </div>
            </div>`;
    }else if (toggleContainer) {
    // Hide controls completely for normal users
    toggleContainer.style.display = 'none';
    toggleContainer.innerHTML = ''; 
    }

    if (!isSales) {
      isGiftOrder = false;
      salesDiscountEnabled = false;
    }

    if(isGiftOrder)
      vkPaymentMode = "Gift";
    else
      vkPaymentMode = null;

    const list = document.getElementById('cart-list');
    const btn = document.getElementById('place-order-btn');
    const gate = document.getElementById('payment-gate'); 

    // 2. Accounting Values
    const userCredit = parseFloat(currentUser.credit || 0);
    const userBalance = parseFloat(currentUser.balance || 0);
    const balEl = document.getElementById('balance-val');
    const creEl = document.getElementById('credit-val');
    if (balEl) balEl.innerText = "₹" + userBalance.toFixed(2);
    if (creEl) creEl.innerText = "-₹" + userCredit.toFixed(2);

    // --- CRITICAL FIX: Define variables BEFORE they are used ---
    let gross = 0;
    let cartHtml = ""; 

    // 3. Empty Cart Check
    if (cart.length === 0) {
        if (list) list.innerHTML = '<div class="text-muted small text-center py-3">Your cart is empty</div>';
        const gVal = document.getElementById('gross-val');
        const dVal = document.getElementById('disc-val');
        const fVal = document.getElementById('final-val');
        if (gVal) gVal.innerText = "₹0.00";
        if (dVal) dVal.innerText = "-₹0.00";
        let netAccount = userBalance - userCredit;
        if (fVal) fVal.innerText = "₹" + (netAccount > 0 ? netAccount : 0).toFixed(2);
        if (btn) { btn.classList.add('disabled'); btn.disabled = true; }
        if (gate) gate.style.display = 'none';
        return;
    }

    // 4. Grouping & Generation
    const grouped = cart.reduce((acc, item) => {
        if (!acc[item.mainCategory]) acc[item.mainCategory] = [];
        acc[item.mainCategory].push(item);
        return acc;
    }, {});

    for (const cat in grouped) {
        cartHtml += `
            <div class="category-divider d-flex align-items-center my-2">
                <span class="fw-bold small text-uppercase" style="color:var(--vg-brown); letter-spacing:1px;">${cat}</span>
                <div class="flex-grow-1 ms-2" style="border-bottom: 1px dashed #ccc;"></div>
            </div>`;

        cartHtml += grouped[cat].map(i => {
            const subtotalNum = parseFloat(i.fullSubtotal);
            gross += subtotalNum;
            return `
                <div class="cart-item d-flex justify-content-between align-items-center py-1 mb-1">
                    <div style="flex: 1; min-width: 0;">
                        <div class="fw-bold text-truncate" style="font-size:0.8rem">${i.itemName}</div>
                        <small class="text-muted" style="font-size:0.7rem">₹${parseFloat(i.salePrice).toFixed(2)} / ${i.uom}</small>
                    </div>
                    <div class="d-flex align-items-center">
                        <div class="input-group input-group-sm me-2" style="width: 80px;">
                            <button class="btn btn-outline-secondary px-1 py-0" onclick="changeCartQty('${i.sku}', -1)">-</button>
                            <span class="form-control text-center p-0 d-flex align-items-center justify-content-center" style="font-size: 0.7rem; min-height:24px;">${i.quantity}</span>
                            <button class="btn btn-outline-secondary px-1 py-0" onclick="changeCartQty('${i.sku}', 1)">+</button>
                        </div>
                        <div class="text-end" style="min-width: 55px;"><span class="fw-bold" style="font-size:0.8rem">₹${subtotalNum.toFixed(2)}</span></div>
                        <i class="material-icons ms-2 remove-btn" style="font-size:16px; cursor:pointer; color:#dc3545;" onclick="removeFromCart(${i.cartId})">cancel</i>
                    </div>
                </div>`;
        }).join('');
    }

    // Inject the generated HTML into the list
    if (list) list.innerHTML = cartHtml;

    // 5. Calculations
    let discAmt = 0;
    if (isGiftOrder) {
        discAmt = gross; 
    } else if (isSales) {
        discAmt = salesDiscountEnabled ? (gross * (parseFloat(currentUser.discount || 0) / 100)) : 0;
    } else {
        discAmt = (gross * (parseFloat(currentUser.discount || 0) / 100));
    }

    const finalTotal = (gross - discAmt) + userBalance - userCredit;
    const displayTotal = finalTotal > 0 ? finalTotal : 0;

    const gVal = document.getElementById('gross-val');
    const dVal = document.getElementById('disc-val');
    const fVal = document.getElementById('final-val');
    
    if (gVal) gVal.innerText = "₹" + gross.toFixed(2);
    if (dVal) dVal.innerText = "-₹" + discAmt.toFixed(2);
    if (fVal) fVal.innerText = "₹" + displayTotal.toFixed(2);
    
    // 6. Payment Gateway
    if (gate) {
        gate.style.display = 'block';
        const payLabel = document.getElementById('pay-amt-label');
        if (payLabel) payLabel.innerText = "₹" + displayTotal.toFixed(2);
        if (typeof updatePaymentButtons === "function") {
            updatePaymentButtons(isSales, displayTotal);
        }
    }
    
    // 7. Button Lock/Unlock
    if (btn) {
        if (isGiftOrder && displayTotal === 0) {
            btn.classList.remove('disabled');
            btn.disabled = false;
        } else {
            btn.classList.add('disabled');
            btn.disabled = true;
        }
    }
}
  /* Cash order processing*/

function toggleSalesDiscount(el) {
  salesDiscountEnabled = el.checked;
  console.log("Sales Discount Toggle:", salesDiscountEnabled);
  updateCartUI(); // Refresh the prices
}

function toggleGiftOrder(el) {
  isGiftOrder = el.checked;
  console.log("Gift Order Toggle:", isGiftOrder);
  
  // Logic: If it's a gift, we usually force the discount toggle to match 
  // or at least refresh the UI to show ₹0.
  updateCartUI(); 
}

function updatePaymentButtons(isSales, amount) {
  const container = document.getElementById('payment-action-container');
  if (!container) return;

  if (isSales && amount > 0) {
    container.innerHTML = `
      <div class="d-flex flex-column mt-3">
        <p class="text-center mb-2 fw-bold" style="font-size:0.65rem; letter-spacing:1.5px; color: var(--vg-brown); opacity: 0.7;">
          SELECT PAYMENT METHOD
        </p>
        
        <button class="btn btn-primary w-100 mb-2 p-0 overflow-hidden" style="min-height: 55px; display: flex;" onclick="showCashConfirmation(${amount})">
          <div class="d-flex align-items-center justify-content-center bg-black-20 px-3">
             <i class="material-icons text-white">payments</i>
          </div>
          <div class="d-flex flex-column justify-content-center text-start ps-3 py-2">
            <span class="fw-bold text-white" style="font-size:0.9rem; line-height: 1.1;">Physical Cash</span>
            <span class="text-white-50" style="font-size:0.65rem; font-weight: normal;">Hand-to-hand collection</span>
          </div>
        </button>

        <div class="text-center position-relative my-2">
          <hr class="m-0" style="border-color: var(--vg-brown); opacity: 0.1;">
          <span class="position-absolute top-50 start-50 translate-middle px-3" 
                style="font-size:0.6rem; background: var(--vg-cream); color: var(--vg-brown); font-weight: bold;">OR</span>
        </div>

        <button class="btn btn-primary w-100 mb-2 p-0 overflow-hidden" style="min-height: 55px; display: flex;" onclick="initiatePayment('UPI')">
          <div class="d-flex align-items-center justify-content-center bg-black-20 px-3">
             <i class="material-icons text-white">qr_code_scanner</i>
          </div>
          <div class="d-flex flex-column justify-content-center text-start ps-3 py-2">

let html5QrCode;
let isScanning = false;
let audioCtx;

async function startScanner() {
  if (isScanning) return;
  isScanning = true;

  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  document.getElementById('scanner-wrapper').style.display = 'block';

  if (html5QrCode) {
    try { await html5QrCode.clear(); } catch(e) {}
  }

  html5QrCode = new Html5Qrcode("reader");

  const qrConfig = { 
    fps: 30, 
    qrbox: { width: 280, height: 120 }, 
    aspectRatio: 1.777778,
    formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128 ],
    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
  };

  html5QrCode.start(
    { facingMode: "environment" },  
    qrConfig, 
    (txt) => {
      if (txt.length > 2) { 
        handleScannedItem(txt); // Calls our new logic above
        stopScanner(); 
        isScanning = false; 
      }
    }
  ).catch(err => {
    isScanning = false;
    console.error("Camera Error:", err);
    alert("Camera could not start. Please check permissions.");
    document.getElementById('scanner-wrapper').style.display = 'none';
  });
}

function handleScannedItem(sku) {
  const item = fullInventory.find(i => i.sku === sku);

  if (item) {
    const minQty = item.moq || 0.5;
    const qtyInput = document.getElementById('qty-' + sku);

    // Physical Feedback
    if ("vibrate" in navigator) navigator.vibrate(100); 
    playBeep();

    if (qtyInput) {
      qtyInput.value = minQty;
      addToCart(sku);
    } else {
      addDirectlyToCart(item, minQty);
    }

    // PROFESSIONAL TOUCH: Clear the search bar every time an item is found
    // This ensures that even if you scanned via camera, the search text is wiped
    const searchBar = document.getElementById('search-bar');
    if (searchBar) {
      searchBar.value = "";
      filterItems(); // Reset the grid to show all items again
    }
    
    showAlert(`Added ${minQty} ${item.uom || ''} of ${item.itemName}`, "success");
  } else {
    // Double vibrate on error
    if ("vibrate" in navigator) navigator.vibrate([50, 100, 50]);
    showAlert("Barcode not recognized: " + sku, "error");
    
    // Clear search even on error so they can try again
    const searchBar = document.getElementById('search-bar');
    if (searchBar) searchBar.value = "";
  }
}

// Helper for when the item isn't rendered in the current filtered list
function addDirectlyToCart(item, qty) {
  const existingItem = cart.find(cartItem => cartItem.sku === item.sku);
  if (existingItem) {
    existingItem.quantity = parseFloat((existingItem.quantity + qty).toFixed(2));
    existingItem.fullSubtotal = (existingItem.quantity * parseFloat(existingItem.salePrice)).toFixed(2);
  } else {
    cart.push({ 
      ...item, 
      cartId: Date.now() + Math.random(), 
      quantity: qty, 
      fullSubtotal: (qty * parseFloat(item.salePrice)).toFixed(2) 
    });
  }
  updateCartUI();
  
  // Animate the sidebar to show something happened
  const cartSidebar = document.getElementById('cart-sidebar');
  cartSidebar.classList.add('cart-updated');
  setTimeout(() => cartSidebar.classList.remove('cart-updated'), 600);
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      document.getElementById('scanner-wrapper').style.display = 'none';
      isScanning = false;
    }).catch(err => console.error("Stop Error:", err));
  }
}

function playBeep() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

/*Auto verify transactions*/
  async function handleVerification(isManual = false) {
    const amountStr = document.getElementById('final-val').innerText.replace(/[₹,]/g, '').trim();
    const amount = parseFloat(amountStr);
    const err = document.getElementById('verify-error');
    const input = document.getElementById('txn-id-input');
    const manualBtn = document.getElementById('manual-verify-btn');
    const autoBtn = document.getElementById('auto-verify-btn');
    const placeOrderBtn = document.getElementById('place-order-btn');

    // This is the line that was likely missing or failing:
    const manualUpload = document.getElementById('manual-upload-section');

    // UI State: Loading
    err.style.color = "blue";
    err.innerText = "Scanning bank logs...";
    autoBtn.disabled = true;

    // Get last 4 digits only if we are in manual mode
    const last4 = isManual ? input.value.trim().slice(-4) : "";

    google.script.run
      .withSuccessHandler((res) => {
        autoBtn.disabled = false;

        if (res.status === "SUCCESS") {
          err.style.color = "#198754";
          err.innerHTML = `<strong>✅ ${res.message}</strong>`;
          input.value = res.txnId; // Fill the full UTR
          input.disabled = true;
          
          // Enable Final Order Button
          placeOrderBtn.classList.remove('disabled');
          placeOrderBtn.disabled = false;
          placeOrderBtn.style.backgroundColor = "var(--vg-brown)";
        } 
        else if (res.status === "DUPLICATES") {
          err.style.color = "#fd7e14";
          err.innerText = res.message;
          
          // UNLOCK the input field
          input.disabled = false;
          input.placeholder = "Enter last 4 digits";
          input.focus();
          manualBtn.disabled = false;
          manualBtn.classList.replace('btn-secondary', 'btn-warning');
        } 
        else {
          // Increment retry counter on "NOT_FOUND" or "ERROR"
          verificationRetries++;
          
          err.style.color = "#dc3545";
          err.innerText = res.message;

          // Trigger manual upload backup after 3 failed tries
          if (verificationRetries >= 3 && manualUpload) {
            manualUpload.style.display = 'block';
            err.innerText += " (Check failed 3 times. You may upload a screenshot below.)";
          }
        }
      })
      .withFailureHandler(e => {
        autoBtn.disabled = false;
        err.innerText = "System Error. Please try again.";
      })
      .autoCheckPayment(amount, currentUser.name, last4);
  }

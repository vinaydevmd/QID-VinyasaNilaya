<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const photoPreview = document.getElementById('photo-preview');
  const videoContainer = document.getElementById('video-container');
  let selfieBase64 = null;
  let stream;

 // REMOVED: window.onload = startSelfieCamera;

  async function initiateSelfieProcess() {
    const video = document.getElementById('selfieStream');
    const placeholder = document.getElementById('cameraPlaceholder');
    const guide = document.getElementById('selfieGuide');
    const overlay = document.getElementById('captureOverlay');
    const status = document.getElementById('selfieStatus');
    const container = document.getElementById('selfieContainer');

    // Don't restart if already active or captured
    if (!video.classList.contains('d-none') || !document.getElementById('selfieCanvas').classList.contains('d-none')) return;

    status.innerText = "Accessing camera...";

    try {
      const mediaStream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user" }, 
        audio: false 
      });
      
      stream = mediaStream;
      video.srcObject = mediaStream;
      
      // UI Transitions
      placeholder.classList.add('d-none');
      video.classList.remove('d-none');
      guide.classList.remove('d-none');
      overlay.classList.remove('d-none');
      
      status.innerHTML = '<span class="text-success fw-bold">● Live Feed Active</span>';
      
      // Remove the "click to start" listener once camera is live
      container.onclick = null; 

    } catch (err) {
      console.warn("Live stream blocked or denied:", err);
      // Silent Fallback to file input (worked for user before)
      status.innerText = "Opening system camera...";
      document.getElementById('selfieInput').click();
    }
  }

 function takeSnapshot() {
    const video = document.getElementById('selfieStream');
    const canvas = document.getElementById('selfieCanvas');
    const guide = document.getElementById('selfieGuide');
    const status = document.getElementById('selfieStatus');
    const retakeBtn = document.getElementById('retakeBtn');

    // Capture current frame
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Switch UI to "Preview" mode
    canvas.classList.remove('d-none');
    video.classList.add('d-none'); // Hide live video
    guide.classList.add('d-none');
    document.getElementById('captureOverlay').classList.add('d-none');
    retakeBtn.classList.remove('d-none');
    status.innerText = "Selfie captured ✓";

    // Stop hardware
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  }

  function restartCamera() {
    const placeholder = document.getElementById('cameraPlaceholder');
    const status = document.getElementById('selfieStatus');
    const canvas = document.getElementById('selfieCanvas');
    const retakeBtn = document.getElementById('retakeBtn');
    const guide = document.getElementById('selfieGuide');

    // 1. Hide the captured photo canvas
    canvas.classList.add('d-none');
    
    // 2. Hide the Retake button and Guide
    retakeBtn.classList.add('d-none');
    guide.classList.add('d-none');

    // 3. Reset the placeholder to its original "Enable" state
    placeholder.classList.remove('d-none');
    placeholder.innerHTML = `
      <div class="rounded-circle bg-primary bg-opacity-10 p-4 mb-3">
        <i class="bi bi-camera-fill h1 text-primary mb-0"></i>
      </div>
      <span class="fw-bold">Tap to Enable Camera</span>
      <small class="text-muted">Front camera will be used for verification</small>
    `;

    // 4. Update status and re-enable the click listener
    status.innerText = "Camera ready";
    document.getElementById('selfieContainer').onclick = initiateSelfieProcess;
  }

  function handleFallbackSelfie(input) {
    const file = input.files[0];
    const status = document.getElementById('selfieStatus');
    const preview = document.getElementById('cameraPlaceholder'); // Use the placeholder div for preview
    const retakeBtn = document.getElementById('retakeBtn');

    if (file) {
      status.innerText = "Processing image...";
      
      const reader = new FileReader();
      
      reader.onload = function(e) {
        // 1. Hide the icons and text inside the placeholder
        preview.innerHTML = ""; 
        
        // 2. Create and append a clean image element
        const img = document.createElement('img');
        img.src = e.target.result;
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "cover";
        img.className = "rounded-4";
        
        preview.appendChild(img);
        
        // 3. Update UI states
        status.innerHTML = '<span class="text-success fw-bold">Selfie captured ✓</span>';
        if (retakeBtn) retakeBtn.classList.remove('d-none');
        
        // Ensure the guide is hidden
        const guide = document.getElementById('selfieGuide');
        if (guide) guide.classList.add('d-none');
      };

      reader.onerror = function() {
        status.innerText = "Error loading image. Please try again.";
      };

      reader.readAsDataURL(file);
    }
  }

  // Function to show the permission modal
  function showPermissionError() {
    const modalLib = window.bootstrap || bootstrap;
    if (typeof modalLib !== 'undefined') {
      const pModal = new modalLib.Modal(document.getElementById('permissionModal'));
      pModal.show();
    } else {
      alert("Camera Access Denied: Please check your browser's site settings (click the lock icon in the URL bar).");
    }
  }


  /**
   * Final Submission to Google Sheets/Drive
   */
  function submitData() {
    const btn = document.getElementById('submitBtn');
    const data = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      arrival: document.getElementById('arrival').value,
      idType: document.getElementById('idType').value,
      idNumber: document.getElementById('idNumber').value,
      terms: document.getElementById('terms').checked,
      selfie: selfieBase64
    };

    // Validation
    if (!data.name || !data.idNumber || !selfieBase64) {
      alert("Please complete all fields, verify your ID, and capture a selfie.");
      return;
    }
    if (!data.terms) {
      alert("Please accept the Terms and Conditions.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Processing...';

    google.script.run
      .withSuccessHandler(res => {
        if (res.success) {
          document.getElementById('formStep').innerHTML = `
            <div class="text-center py-4">
              <h3 class="text-success">✓ Success!</h3>
              <p>${res.message}</p>
              <button class="btn btn-outline-primary btn-sm" onclick="window.location.reload()">New Registration</button>
            </div>`;
        } else {
          alert("Error: " + res.message);
          btn.disabled = false;
          btn.innerHTML = "Complete Booking";
        }
      })
      .processSubmission(data);
  }

  async function extractAadhaarDetails() {
    const fileInput = document.getElementById('aadhaarFront');
    if (!fileInput.files[0]) return alert("Please select the Front of your Aadhaar first.");

    const btn = document.querySelector('button[onclick="extractAadhaarDetails()"]');
    btn.innerText = "Scanning...";
    
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      
      google.script.run.withSuccessHandler(rawText => {
        google.script.run.withSuccessHandler(result => {
          // Auto-fill the form fields
          if(result.name) document.getElementById('name').value = result.name;
          if(result.idNumber) document.getElementById('idNumber').value = result.idNumber;
          
          btn.innerText = "Scan Complete";
          alert("Details extracted! Please verify them for accuracy.");
        }).parseAadhaarData(rawText);
      }).extractTextFromImage(base64);
    };
    reader.readAsDataURL(fileInput.files[0]);
  }

  function handlePreview(input, previewId) {
    const container = document.getElementById(previewId);
    const file = input.files[0];
    
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
      // We wrap the image and text in a relative div to keep them contained
      container.innerHTML = `
        <div style="position: relative; width: 100%; height: 100%;">
          <img src="${e.target.result}" class="preview-image">
          <div style="position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(255,255,255,0.8); padding: 5px 0; z-index: 10;">
            <p class="small text-success m-0 fw-bold">Image Loaded ✓</p>
          </div>
        </div>`;
    };
    
    reader.onerror = function() {
      showPermissionError();
    };

    reader.readAsDataURL(file);
  }

  /**
   * Dynamically updates ID options based on Nationality radio selection
   */
  function updateIdOptions() {
    const isIndian = document.getElementById('natIndian').checked;
    const idSelect = document.getElementById('idType');
    
    // Clear existing options
    idSelect.innerHTML = '';

    if (isIndian) {
      const indianOptions = [
        { val: 'Aadhaar', text: 'Aadhaar Card' },
        { val: 'VoterID', text: 'Voter ID' },
        { val: 'DL', text: 'Driving License' }
      ];
      indianOptions.forEach(opt => {
        idSelect.options.add(new Option(opt.text, opt.val));
      });
    } else {
      // Foreign Guests: Restricted to Passport only
      idSelect.options.add(new Option('Passport', 'Passport'));
    }
    
    // Optional: Reset scanner UI if you have different guides for different IDs
    if (typeof updateScannerUI === "function") updateScannerUI();
  }

    /**
     * Ensure the logic runs when the page loads so the default state (Indian) is set
     */
    document.addEventListener('DOMContentLoaded', function() {
      updateIdOptions();
  });

  async function handleIdScan() {
    const frontFile = document.getElementById('idFront').files[0];
    const backFile = document.getElementById('idBack').files[0]; // Fetch the back side
    const currentMobile = document.getElementById('searchMobile').value;
    
    const nationality = document.querySelector('input[name="nationality"]:checked').value;
    const idType = document.getElementById('idType').value;
    
    if (!frontFile) return showNotification("Upload Required", "Please upload the Front side of your ID.", "warning");
    if (!currentMobile) return showNotification("Mobile Required", "Mobile number is required for verification.", "warning");

    const btn = document.getElementById('scanBtn');
    const spinner = document.getElementById('scanSpinner');
    
    // Enter Scanning State
    btn.disabled = true;
    if (spinner) spinner.classList.remove('d-none');
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Analyzing ' + idType + '...';

    // Helper function to convert file to Base64
    const toBase64 = file => new Promise((resolve, reject) => {
      if (!file) resolve(null);
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });

    try {
      // 1. Read both images simultaneously
      const [frontBase64, backBase64] = await Promise.all([
        toBase64(frontFile),
        toBase64(backFile)
      ]);

      // 2. Execute Unified Flow (Passing BOTH images)
      google.script.run
        .withSuccessHandler(function(res) {
          
          // Security Cross-Check
          google.script.run
            .withSuccessHandler(function(checkRes) {
              if (checkRes.conflict) {
                btn.disabled = false;
                btn.innerHTML = 'Start AI Identity Scan';
                btn.className = "btn btn-primary w-100 py-3 fw-bold";
                
                document.getElementById('name').value = "";
                document.getElementById('idNumber').value = "";
                
                showNotification(
                  "Security Alert", 
                  `This ID is already associated with "${checkRes.existingName}".`, 
                  "error"
                );
                resetImageUploads();
                return;
              }

              // SUCCESS: Populate UI
              document.getElementById('ocrConfirmation').classList.remove('d-none');
              document.getElementById('name').value = (res.name !== "Not found") ? res.name : "";
              
              // Privacy Redaction for Aadhaar handled on display
              const isAadhaar = idType === "Aadhaar";
              document.getElementById('idNumber').value = res.idNumber;

              if (spinner) spinner.classList.add('d-none');
              btn.disabled = false;
              btn.innerHTML = 'Scan Complete ✓';
              btn.className = "btn btn-success w-100 mb-4 shadow-sm";
              
              validateFormState();
            })
            .checkIdMobileAssociation(res.idNumber, currentMobile); 
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          if (spinner) spinner.classList.add('d-none');
          btn.innerHTML = 'Start AI Identity Scan';
          resetImageUploads();
          showNotification("Scan Failed", "We couldn't read your " + idType + ". Please try clearer photos of both sides.", "error");
        })
        .executeOcrFlow(frontBase64, backBase64, idType, nationality);

    } catch (error) {
      btn.disabled = false;
      showNotification("Upload Error", "There was an error reading the files. Please try again.", "error");
    }
  }

  // Function to clear everything
  function resetImageUploads() {
    // Clear inputs
    document.getElementById('idFront').value = "";
    document.getElementById('idBack').value = "";
    const sBtn = document.getElementById('searchBtn');
    //const sInput = document.getElementById('searchMobile');

    sBtn.disabled = false;
    sBtn.innerHTML = 'Search';
    //sInput.readOnly = false;
    //sInput.value = "";
    
    // Reset Front Preview Tile
    document.getElementById('frontPreview').innerHTML = `
      <i class="bi bi-camera-fill h2 mb-1 text-primary"></i>
      <span class="d-block fw-semibold">Front Side</span>
      <small class="text-muted">Tap to try again</small>
    `;
    
    // Reset Back Preview Tile
    document.getElementById('backPreview').innerHTML = `
      <i class="bi bi-camera-fill h2 mb-1 text-primary"></i>
      <span class="d-block fw-semibold">Back Side</span>
      <small class="text-muted">Tap to try again</small>
    `;
  }

  // Function to trigger the professional popup
  function showCustomError(message) {
    const modalText = document.getElementById('errorModalMessage');
    const modalElement = document.getElementById('errorModal');
    
    if (modalText) modalText.innerText = message;

    // Ensure bootstrap is available globally
    const bootstrapLib = window.bootstrap || bootstrap;

    if (typeof bootstrapLib !== 'undefined') {
      try {
        const myModal = new bootstrapLib.Modal(modalElement);
        myModal.show();
      } catch (e) {
        console.error("Modal initialization failed:", e);
        alert(message); 
      }
    } else {
      // Fallback if the CDN failed or is still loading
      console.warn("Bootstrap JS not found, using fallback alert.");
      alert("Scan Error: " + message);
    }
  }

  function finalSubmit() {
    const overlay = document.getElementById('loadingOverlay');
    const submitBtn = document.getElementById('submitBtn');

    // 1. Show Progress
    overlay.classList.remove('d-none');
    submitBtn.disabled = true;

    // 2. Prepare Data Object
    const formData = {
      rowNumber: document.getElementById('rowNumber').value || null, // Critical for updates
      name: document.getElementById('name').value,
      idType: document.getElementById('idType').value,
      idNumber: document.getElementById('idNumber').value,
      whatsapp: document.getElementById('whatsapp').value,
      purpose: document.getElementById('purpose').value,
      city: document.getElementById('city').value,
      emergencyName: document.getElementById('emergencyName').value,
      emergencyPhone: document.getElementById('emergencyPhone').value,
      
      // Capture the Selfie Base64 from Canvas
      selfieBase64: document.getElementById('selfieCanvas').toDataURL('image/jpeg', 0.8),
      
      // Capture ID Proofs only if they were just scanned (new guest)
      idFrontBase64: window.idFrontBase64 || null, 
      idBackBase64: window.idBackBase64 || null,
      
      consent: document.getElementById('termsAccepted').checked
    };

    // 3. Send to Google Apps Script
    google.script.run
      .withSuccessHandler(function(res) {
        overlay.classList.add('d-none');
        if (res.success) {
          showNotification(
            "Check-in Successful", 
            `Registration Complete! Your Serial Number is VN-${res.slNo}. ${res.status}`, 
            "success"
          );
          // Optional: Redirect or reload after 3 seconds
          setTimeout(() => { location.reload(); }, 3500);
        }
      })
      .withFailureHandler(function(err) {
        overlay.classList.add('d-none');
        submitBtn.disabled = false;
        showNotification("Submission Error", err.message, "error");
      })
      .processSubmission(formData);
  }

  // Helper function to convert files to Base64
  function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

  function handleMobileSearch() {
    const searchMobile = document.getElementById('searchMobile').value;
    const searchBtn = document.getElementById('searchBtn');
    const whatsappField = document.getElementById('whatsapp'); // Ensure this ID exists in Section 3

    if (searchMobile.length < 10) {
      showNotification(
        "Invalid Number", 
        "Please enter a valid 10-digit mobile number to proceed with the search.", 
        "warning"
      );
      return;
    }

    // --- 1. ENTER SEARCHING STATE ---
    searchBtn.disabled = true;
    // Using a small spinner for a professional look
    searchBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Searching...';

    // 1. Immediately set WhatsApp field to search value
    whatsappField.value = searchMobile;

    google.script.run
      .withSuccessHandler(function(guest) {

        const sInput = document.getElementById('searchMobile');
        const sBtn = document.getElementById('searchBtn');
        const idUploadSection = document.getElementById('idUploadSection');
        const ocrConfirmation = document.getElementById('ocrConfirmation');
        const welcomeMsg = document.getElementById('welcomeMsg');

        if (guest.exists) {

          // --- 2. SEARCH SUCCESSFUL ---
          // Restore text but keep it disabled to lock the session
          searchBtn.innerHTML = 'Search';
          sBtn.disabled = true; 
          sInput.readOnly = true;

          // RETURNING GUEST
          idUploadSection.classList.add('d-none'); // Hide scanning
          ocrConfirmation.classList.remove('d-none');
          welcomeMsg.classList.remove('d-none');
          
          document.getElementById('name').value = guest.name;
          document.getElementById('idType').value = guest.idType;
          document.getElementById('idNumber').value = guest.idNumber;
          document.getElementById('emergencyName').value = guest.emergencyName;
          document.getElementById('emergencyPhone').value = guest.emergencyPhone;
          document.getElementById('city').value = guest.city;
          
          // Lock inputs to prevent accidental changes
          //document.getElementById('rowNumber').value = guest.rowNumber; // Check if this ID matches exactly
          //console.log("Found guest at row: " + guest.rowNumber);

        } else {
          // --- 3. SEARCH FAILED (New Guest) ---
          // Re-enable so they can fix the number if it was a typo
          sBtn.disabled = false;
          sBtn.innerHTML = 'Search';

          // NEW GUEST
          idUploadSection.classList.remove('d-none'); // Show scanning
          ocrConfirmation.classList.add('d-none');
          welcomeMsg.classList.add('d-none');
          // New way
          showNotification(
            "New Guest", 
            "Mobile number not found in our records. Please proceed with the ID Scan to register.", 
            "info"
          );
        }
      })
      .withFailureHandler(function(err) {
        // --- 4. ERROR STATE ---
        sBtn.disabled = false;
        sBtn.innerHTML = 'Search';
        showNotification("Error", "System search failed. Please try again.", "error");
      })
      .searchGuestByMobile(searchMobile);
  }

  /**
   * Triggers a custom modal instead of an alert
   * @param {string} title - Modal Title
   * @param {string} message - The message body
   * @param {string} type - 'success', 'warning', or 'error'
   */
  function showNotification(title, message, type = 'info') {
    const modalElement = document.getElementById('notificationModal');
    const modal = new bootstrap.Modal(modalElement);
    
    const titleEl = document.getElementById('modalTitle');
    const msgEl = document.getElementById('modalMessage');
    const iconBox = document.getElementById('modalIconContainer');
    const btn = document.getElementById('modalActionBtn');

    // Set Content
    titleEl.innerText = title;
    msgEl.innerText = message;

    // Set Style based on type
    let iconHtml = '';
    btn.className = "btn w-100 rounded-pill py-2 fw-bold ";

    if (type === 'success') {
      iconHtml = '<i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>';
      btn.classList.add('btn-success');
    } else if (type === 'warning' || type === 'error') {
      iconHtml = '<i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>';
      btn.classList.add('btn-danger');
    } else {
      iconHtml = '<i class="bi bi-info-circle-fill text-primary" style="font-size: 3rem;"></i>';
      btn.classList.add('btn-primary');
    }

    iconBox.innerHTML = iconHtml;

    // Add this right before modal.show();
    modalElement.addEventListener('hidden.bs.modal', function () {
      if (type === 'warning') {
        document.getElementById('searchMobile').focus();
      }
    }, { once: true });
    
    modal.show();
  }

  /**
   * Monitors form state to enable/disable the submit button
   */
  function validateFormState() {
    const submitBtn = document.getElementById('submitBtn');
    
    // 1. Check Personal/ID Data
    const hasName = document.getElementById('name').value.trim() !== "";
    const hasId = document.getElementById('idNumber').value.trim() !== "";
    const idVerified = document.getElementById('detailsVerified').checked;

    
    // 2. Check Selfie 
    const selfieCanvas = document.getElementById('selfieCanvas');
    const selfieData = selfieCanvas.toDataURL();

    // Create a temporary blank canvas of the same size to compare
    const blankCanvas = document.createElement('canvas');
    blankCanvas.width = selfieCanvas.width;
    blankCanvas.height = selfieCanvas.height;
    const blankData = blankCanvas.toDataURL();

    // hasSelfie is true only if the current canvas is DIFFERENT from a blank one
    // OR if a file was manually uploaded
    const hasSelfie = (selfieData !== blankData) || (document.getElementById('selfieInput').files.length > 0);


    // 3. Check Terms & Consent
    const termsAccepted = document.getElementById('termsAccepted').checked;
    const infoConfirmed = document.getElementById('detailsVerified').checked; // Using your Column 6 check

    // Master Toggle
    if (hasName && hasId && idVerified && hasSelfie && termsAccepted && infoConfirmed) {
      submitBtn.disabled = false;
      submitBtn.classList.remove('opacity-50');
    } else {
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50');
    }
  }

// Add event listeners to all triggers
document.addEventListener('change', validateFormState);
document.addEventListener('input', validateFormState);

// Initialize button as disabled on load
window.onload = () => { document.getElementById('submitBtn').disabled = true; };


</script>
